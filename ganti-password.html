<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
<meta name="theme-color" content="#0d0d1a">
<title>GudangHub — Ganti Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --orange: #ff6b00;
  --orange-light: #ff8c38;
  --orange-deep: #e05a00;
  --ink: #0d0d1a;
  --ink2: #14141f;
  --ink3: #1a1a24;
  --line: rgba(255,255,255,0.09);
  --line2: rgba(255,255,255,0.05);
  --text: #ede8e2;
  --muted: #9a958f;
  --field: #1a1a24;
  --green: #22c55e;
  --red: #ef4444;
  --safe-top: env(safe-area-inset-top, 0);
  --safe-bottom: env(safe-area-inset-bottom, 0);
  --safe-left: env(safe-area-inset-left, 0);
  --safe-right: env(safe-area-inset-right, 0);
}

html {
  background: var(--ink);
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  overflow-x: hidden;
}

html, body { height: 100%; }

body {
  background: var(--ink);
  color: var(--text);
  font-family: 'Manrope', system-ui, -apple-system, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  min-height: 100vh;
  padding: 24px;
  padding-top: max(24px, var(--safe-top));
  padding-bottom: max(24px, var(--safe-bottom));
  padding-left: max(24px, var(--safe-left));
  padding-right: max(24px, var(--safe-right));
  position: relative;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.5;
}

.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(50vw 50vw at 85% 12%, rgba(255,107,0,0.10), transparent 60%),
    radial-gradient(45vw 45vw at 8% 95%, rgba(255,107,0,0.07), transparent 60%);
}

a { color: inherit; text-decoration: none; }
img { max-width: 100%; height: auto; display: block; }

/* ═══════════ CARD ═══════════ */
.card {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 440px;
  background: linear-gradient(150deg, #17171f 0%, #121219 60%, #191118 100%);
  border: 1px solid var(--line2);
  border-radius: clamp(18px, 3vw, 26px);
  box-shadow: 0 50px 120px -30px rgba(0,0,0,0.8);
  padding: clamp(24px, 4vw, 34px);
}

.top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}

.brand-mark {
  width: 40px;
  height: 40px;
  border-radius: 11px;
  background: linear-gradient(140deg, var(--orange), var(--orange-deep));
  display: grid;
  place-items: center;
  color: #fff;
  box-shadow: 0 6px 18px rgba(255,107,0,0.4);
  flex-shrink: 0;
  font-size: 18px;
}

.brand-name {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: clamp(17px, 2vw, 20px);
  letter-spacing: -0.02em;
}

.brand-name em { color: var(--orange); font-style: normal; }

.back {
  margin-left: auto;
  font-size: 13px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.15s;
  padding: 8px 10px;
  min-height: 40px;
  border-radius: 8px;
}

.back:hover, .back:focus {
  color: var(--orange);
  background: rgba(255,255,255,0.03);
}

.title {
  font-family: 'Fraunces', serif;
  font-size: clamp(24px, 4vw, 30px);
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
  overflow-wrap: break-word;
}

.title em { font-style: italic; color: var(--orange); }

.sub {
  font-size: clamp(13px, 1.6vw, 14px);
  color: var(--muted);
  margin: 8px 0 24px;
}

/* ═══════════ USER INFO ═══════════ */
.who {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--field);
  border: 1px solid var(--line2);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 22px;
}

.who .av {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(140deg, var(--orange), var(--orange-deep));
  display: grid;
  place-items: center;
  color: #fff;
  font-weight: 700;
  font-family: 'Manrope';
  font-size: 16px;
  flex-shrink: 0;
}

.who .wn {
  font-size: 14px;
  font-weight: 700;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.who .wu {
  font-size: 12px;
  color: var(--muted);
  font-family: monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.who div:nth-child(2) {
  min-width: 0;
  flex: 1;
}

/* ═══════════ FIELDS ═══════════ */
.field-group { margin-bottom: 18px; }

.field-label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 9px;
}

.field {
  position: relative;
}

.fi {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
  font-size: 16px;
}

.field input {
  width: 100%;
  background: var(--field);
  border: 1px solid var(--line2);
  border-radius: 12px;
  padding: 15px 46px 15px 42px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: all 0.15s;
  -webkit-appearance: none;
  appearance: none;
  min-height: 50px;
}

.field input:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 3px rgba(255,107,0,0.14);
}

.toggle-pw {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 8px;
  min-width: 36px;
  min-height: 36px;
  display: grid;
  place-items: center;
  font-size: 15px;
  border-radius: 8px;
  transition: color 0.15s, background 0.15s;
  font-family: inherit;
}

.toggle-pw:hover {
  color: var(--orange);
  background: rgba(255,255,255,0.03);
}

.hint-txt {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
  line-height: 1.4;
}

/* ═══════════ BUTTON ═══════════ */
.btn {
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 15px;
  background: linear-gradient(135deg, var(--orange), var(--orange-light));
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  transition: transform 0.2s cubic-bezier(0.16,1,0.3,1), box-shadow 0.2s;
  box-shadow: 0 8px 25px rgba(255,107,0,0.35);
  margin-top: 6px;
  min-height: 50px;
}

.btn:hover, .btn:focus {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(255,107,0,0.5);
}

.btn:active { transform: translateY(0); }

.btn.loading {
  pointer-events: none;
  opacity: 0.75;
}

.spinner {
  width: 17px;
  height: 17px;
  border: 2px solid rgba(255,255,255,0.35);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: inline-block;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════ MESSAGES ═══════════ */
.msg {
  display: none;
  align-items: flex-start;
  gap: 8px;
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 13px;
  margin-bottom: 16px;
  line-height: 1.5;
}

.msg.show { display: flex; }

.msg.err {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  color: #f87171;
}

.msg.ok {
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.3);
  color: #4ade80;
}

.msg-ic {
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 1px;
}

/* Shake animation */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

.shake { animation: shake 0.4s ease; }

/* ═══════════ RESPONSIVE ═══════════ */
@media (max-width: 480px) {
  body {
    padding: 16px;
    padding-top: max(16px, var(--safe-top));
    padding-bottom: max(16px, var(--safe-bottom));
  }

  .card { border-radius: 18px; }
  .field input { font-size: 16px; /* iOS zoom fix */ }
  .top { gap: 10px; }
  .back { font-size: 12px; padding: 6px 8px; }
}

@media (max-width: 360px) {
  .card { padding: 20px; }
  .title { font-size: 22px; }
  .brand-name { font-size: 15px; }
  .field input { padding: 14px 42px 14px 40px; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,107,0,0.3); border-radius: 3px; }
</style>
</head>
<body>

<div class="bg" aria-hidden="true"></div>

<div class="card" id="card">
  <div class="top">
    <div class="brand-mark">🏪</div>
    <div class="brand-name">Gudang<em>Hub</em></div>
    <a class="back" id="backLink" href="dashboard.html">← Kembali</a>
  </div>

  <h1 class="title">Ganti <em>Password</em></h1>
  <p class="sub">Perbarui password akun Anda. Minimal 6 karakter.</p>

  <div class="who" id="whoBox">
    <div class="av" id="whoAv">?</div>
    <div>
      <div class="wn" id="whoNama">-</div>
      <div class="wu" id="whoUser">-</div>
    </div>
  </div>

  <div class="msg err" id="errMsg">
    <span class="msg-ic">⚠️</span>
    <span id="errText"></span>
  </div>
  <div class="msg ok" id="okMsg">
    <span class="msg-ic">✅</span>
    <span id="okText"></span>
  </div>

  <form onsubmit="submitGanti(event)" autocomplete="on" novalidate>
    <div class="field-group">
      <label class="field-label" for="passLama">Password Lama</label>
      <div class="field">
        <span class="fi">🔒</span>
        <input
          type="password"
          id="passLama"
          placeholder="Password saat ini"
          autocomplete="current-password"
          required>
        <button
          type="button"
          class="toggle-pw"
          onclick="togglePw('passLama', this)"
          aria-label="Lihat password lama">
          👁️
        </button>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="passBaru">Password Baru</label>
      <div class="field">
        <span class="fi">🔑</span>
        <input
          type="password"
          id="passBaru"
          placeholder="Minimal 6 karakter"
          minlength="6"
          autocomplete="new-password"
          required>
        <button
          type="button"
          class="toggle-pw"
          onclick="togglePw('passBaru', this)"
          aria-label="Lihat password baru">
          👁️
        </button>
      </div>
      <div class="hint-txt">💡 Gunakan kombinasi huruf, angka, dan simbol untuk keamanan lebih.</div>
    </div>

    <div class="field-group">
      <label class="field-label" for="passUlang">Ulangi Password Baru</label>
      <div class="field">
        <span class="fi">🔑</span>
        <input
          type="password"
          id="passUlang"
          placeholder="Ketik ulang password baru"
          minlength="6"
          autocomplete="new-password"
          required>
        <button
          type="button"
          class="toggle-pw"
          onclick="togglePw('passUlang', this)"
          aria-label="Lihat password ulang">
          👁️
        </button>
      </div>
    </div>

    <button type="submit" class="btn" id="btn">
      <span id="btnText" style="display:flex;align-items:center;gap:9px;">
        <span>💾</span> Simpan Password Baru
      </span>
    </button>
  </form>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbzk8A4xuXOVGqbK6a4zffpG6u2s4jVROZwIitmCDat2fYU7qyU3VkxQJmtxtEtjQxji/exec';

let SESSION = null;

// ═══════════════════════════════════════════════════════════════
// SESSION CHECK
// ═══════════════════════════════════════════════════════════════
try {
  SESSION = JSON.parse(sessionStorage.getItem('gudanghub_session') || 'null');
} catch (e) {}

if (!SESSION || new Date(SESSION.expires) < new Date()) {
  // Belum login → ke halaman login
  window.location.href = 'login.html';
} else {
  // Tampilkan identitas & atur tombol kembali sesuai peran
  document.getElementById('whoBox').style.display = 'flex';
  document.getElementById('whoNama').textContent = SESSION.nama || SESSION.username;
  document.getElementById('whoUser').textContent = '@' + SESSION.username;
  document.getElementById('whoAv').textContent = (SESSION.nama || SESSION.username || '?').charAt(0).toUpperCase();

  document.getElementById('backLink').href = SESSION.role === 'admin'
    ? 'dashboard.html'
    : 'order.html?cabang=' + encodeURIComponent(SESSION.idCabang || '');
}

// ═══════════════════════════════════════════════════════════════
// TOGGLE PASSWORD VISIBILITY
// ═══════════════════════════════════════════════════════════════
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁️';
}

// ═══════════════════════════════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════════════════════════════
function showMsg(kind, text) {
  const err = document.getElementById('errMsg');
  const ok = document.getElementById('okMsg');
  err.classList.remove('show');
  ok.classList.remove('show');
  if (kind === 'err') {
    document.getElementById('errText').textContent = text;
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 6000);
  } else {
    document.getElementById('okText').textContent = text;
    ok.classList.add('show');
  }
}

function resetBtn() {
  const btn = document.getElementById('btn');
  btn.classList.remove('loading');
  document.getElementById('btnText').innerHTML = '<span>💾</span> Simpan Password Baru';
}

function shakeCard() {
  const c = document.getElementById('card');
  c.classList.add('shake');
  setTimeout(() => c.classList.remove('shake'), 400);
}

// ═══════════════════════════════════════════════════════════════
// API CALL
// ═══════════════════════════════════════════════════════════════
function parseResp(text) {
  if (!text) return { status: 'error', message: 'Respons kosong.' };
  try { return JSON.parse(text); } catch (e) {}
  try {
    const m = text.match(/\{[\s\S]*\}/);
    if (m) return JSON.parse(m[0]);
  } catch (e) {}
  return { status: 'error', message: 'Respons tidak valid.' };
}

async function kirim(payload) {
  const body = JSON.stringify(payload);
  try {
    const enc = encodeURIComponent(body);
    const r = await fetch(`${API_URL}?action=changePassword&payload=${enc}`, { method: 'GET', cache: 'no-store' });
    const d = parseResp(await r.text());
    if (d.status) return d;
  } catch (e) {}
  try {
    const f = new FormData();
    f.append('payload', body);
    const r = await fetch(API_URL, { method: 'POST', body: f, cache: 'no-store' });
    return parseResp(await r.text());
  } catch (e) {}
  return { status: 'error', message: 'Gagal terhubung ke server. Cek koneksi internet.' };
}

// ═══════════════════════════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════════════════════════
async function submitGanti(e) {
  e.preventDefault();
  if (!SESSION) return;

  const lama = document.getElementById('passLama').value;
  const baru = document.getElementById('passBaru').value;
  const ulang = document.getElementById('passUlang').value;

  // Validasi
  if (!lama || !baru || !ulang) {
    showMsg('err', 'Semua kolom wajib diisi.');
    shakeCard();
    return;
  }
  if (baru.length < 6) {
    showMsg('err', 'Password baru minimal 6 karakter.');
    shakeCard();
    return;
  }
  if (baru !== ulang) {
    showMsg('err', 'Ulangi password tidak sama dengan password baru.');
    shakeCard();
    return;
  }
  if (baru === lama) {
    showMsg('err', 'Password baru harus berbeda dari password lama.');
    shakeCard();
    return;
  }

  const btn = document.getElementById('btn');
  btn.classList.add('loading');
  document.getElementById('btnText').innerHTML = '<span class="spinner"></span> Menyimpan...';

  const hasil = await kirim({
    action: 'changePassword',
    username: SESSION.username,
    passwordLama: lama,
    passwordBaru: baru
  });

  if (hasil.status === 'ok') {
    showMsg('ok', hasil.message || 'Password berhasil diubah. Silakan pakai password baru saat login berikutnya.');
    document.querySelector('form').reset();
    resetBtn();

    // Auto redirect setelah 3 detik
    setTimeout(() => {
      const redirect = SESSION.role === 'admin'
        ? 'dashboard.html'
        : 'order.html?cabang=' + encodeURIComponent(SESSION.idCabang || '');
      window.location.href = redirect;
    }, 3000);
  } else {
    showMsg('err', hasil.message || 'Gagal mengubah password.');
    resetBtn();
    shakeCard();
  }
}

// Fix 100vh bug pada mobile
function setVH() {
  document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
}
setVH();
window.addEventListener('resize', setVH, { passive: true });
window.addEventListener('orientationchange', setVH, { passive: true });
</script>

</body>
</html>
