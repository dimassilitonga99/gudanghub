<!DOCTYPE html>
<html lang="id">
<head>
<!-- skill:chrome -->
<style>
/* Credit line — bottom-right */
.design-ui-credit {
  position: fixed;
  bottom: 12px;
  right: 12px;
  font: 11px/1 system-ui, sans-serif;
  color: rgba(128,128,128,0.5);
  pointer-events: none;
  z-index: 2147483647;
  transition: opacity 0.4s ease;
  user-select: none;
  letter-spacing: 0.02em;
}

/* Hide chrome on touch devices */
@media (hover: none) {
  .design-ui-credit { display: none; }
}

/* Print fixes */
@media print {
  * {
    transition: none !important;
    animation: none !important;
    box-shadow: none !important;
  }
  body {
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
  .design-ui-credit { display: none !important; }
}

</style>
<script>
(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

</script>

<script src="https://cdn.jsdelivr.net/npm/lucide@0.383.0/dist/umd/lucide.min.js" integrity="sha384-wHFvAtjmgnkA2PJcMsDaCgdipf7X7YV44X/igbLHpvGiq6T5/PvFKl93grpvtbQT" crossorigin="anonymous"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GudangHub — Ganti Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --orange: #ff6b00; --orange-light: #ff8c38; --orange-deep: #e05a00;
  --ink: #0c0c15; --ink2: #14141f; --line: rgba(255,255,255,0.09);
  --line2: rgba(255,255,255,0.06); --text: #ede8e2; --muted: #9a958f;
  --field: #1a1a24; --green: #22c55e; --red: #ef4444;
}
html, body { height: 100%; }
body {
  background: var(--ink); color: var(--text);
  font-family: 'Manrope', system-ui, sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px; position: relative; overflow: hidden; -webkit-font-smoothing: antialiased;
}
.bg { position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(50vw 50vw at 85% 12%, rgba(255,107,0,0.10), transparent 60%),
    radial-gradient(45vw 45vw at 8% 95%, rgba(255,107,0,0.07), transparent 60%), var(--ink); }
a { color: inherit; text-decoration: none; }
[data-lucide] { display: inline-block; vertical-align: middle; stroke-width: 1.7; }

.card {
  position: relative; z-index: 2; width: 100%; max-width: 440px;
  background: linear-gradient(150deg, #17171f 0%, #121219 60%, #191118 100%);
  border: 1px solid var(--line2); border-radius: 24px;
  box-shadow: 0 50px 120px -30px rgba(0,0,0,0.8); padding: 34px;
}
.top { display: flex; align-items: center; gap: 11px; margin-bottom: 26px; }
.brand-mark { width: 40px; height: 40px; border-radius: 11px; background: linear-gradient(140deg, var(--orange), var(--orange-deep)); display: grid; place-items: center; color: #fff; box-shadow: 0 6px 18px rgba(255,107,0,0.4); }
.brand-name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px; }
.brand-name em { color: var(--orange); font-style: normal; }
.back { margin-left: auto; font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
.back:hover { color: var(--orange); }

.title { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600; letter-spacing: -0.01em; }
.title em { font-style: italic; color: var(--orange); }
.sub { font-size: 14px; color: var(--muted); margin: 8px 0 24px; }

.who { display: flex; align-items: center; gap: 12px; background: var(--field); border: 1px solid var(--line2); border-radius: 12px; padding: 12px 14px; margin-bottom: 22px; }
.who .av { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(140deg, var(--orange), var(--orange-deep)); display: grid; place-items: center; color: #fff; font-weight: 700; flex-shrink: 0; }
.who .wn { font-size: 14px; font-weight: 700; }
.who .wu { font-size: 12px; color: var(--muted); font-family: monospace; }

.field-group { margin-bottom: 18px; }
.field-label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 9px; }
.field { position: relative; }
.field .fi { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.field input { width: 100%; background: var(--field); border: 1px solid var(--line2); border-radius: 12px; padding: 15px 46px; color: var(--text); font-size: 14.5px; font-family: inherit; outline: none; transition: all 0.2s; }
.field input::placeholder { color: var(--muted); }
.field input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,107,0,0.14); }
.toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px; display: grid; place-items: center; }
.toggle-pw:hover { color: var(--orange); }
.hint-txt { font-size: 12px; color: var(--muted); margin-top: 6px; }

.btn {
  width: 100%; border: none; border-radius: 12px; padding: 15px;
  background: linear-gradient(135deg, var(--orange), var(--orange-light));
  color: #fff; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 9px;
  transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), box-shadow 0.25s; margin-top: 6px;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(255,107,0,0.42); }
.btn.loading { pointer-events: none; opacity: 0.75; }
.spinner { width: 17px; height: 17px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.msg { display: none; align-items: center; gap: 8px; border-radius: 10px; padding: 11px 14px; font-size: 13px; margin-bottom: 16px; }
.msg.show { display: flex; }
.msg.err { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
.msg.ok  { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
</style>
</head>
<body>

<div class="bg" aria-hidden="true"></div>

<div class="card" id="card">
  <div class="top">
    <span class="brand-mark"><i data-lucide="warehouse" width="21" height="21"></i></span>
    <span class="brand-name">Gudang<em>Hub</em></span>
    <a class="back" id="backLink" href="order.html"><i data-lucide="arrow-left" width="16" height="16"></i> Kembali</a>
  </div>

  <h1 class="title">Ganti <em>Password</em></h1>
  <p class="sub">Perbarui password akun Anda. Minimal 6 karakter.</p>

  <div class="who" id="whoBox" style="display:none;">
    <span class="av" id="whoAv">?</span>
    <div>
      <div class="wn" id="whoNama">—</div>
      <div class="wu" id="whoUser">—</div>
    </div>
  </div>

  <div class="msg err" id="errMsg"><i data-lucide="alert-triangle" width="16" height="16"></i> <span id="errText"></span></div>
  <div class="msg ok" id="okMsg"><i data-lucide="check-circle" width="16" height="16"></i> <span id="okText"></span></div>

  <form onsubmit="submitGanti(event)">
    <div class="field-group">
      <label class="field-label">Password Lama</label>
      <div class="field">
        <span class="fi"><i data-lucide="lock" width="18" height="18"></i></span>
        <input type="password" id="passLama" placeholder="Password saat ini" required>
        <button type="button" class="toggle-pw" onclick="tog('passLama', this)" aria-label="Lihat"><i data-lucide="eye" width="18" height="18"></i></button>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Password Baru</label>
      <div class="field">
        <span class="fi"><i data-lucide="key-round" width="18" height="18"></i></span>
        <input type="password" id="passBaru" placeholder="Minimal 6 karakter" minlength="6" required>
        <button type="button" class="toggle-pw" onclick="tog('passBaru', this)" aria-label="Lihat"><i data-lucide="eye" width="18" height="18"></i></button>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Ulangi Password Baru</label>
      <div class="field">
        <span class="fi"><i data-lucide="key-round" width="18" height="18"></i></span>
        <input type="password" id="passUlang" placeholder="Ketik ulang password baru" minlength="6" required>
        <button type="button" class="toggle-pw" onclick="tog('passUlang', this)" aria-label="Lihat"><i data-lucide="eye" width="18" height="18"></i></button>
      </div>
    </div>

    <button type="submit" class="btn" id="btn">
      <span id="btnText" style="display:flex;align-items:center;gap:9px;"><i data-lucide="save" width="18" height="18"></i> Simpan Password Baru</span>
    </button>
  </form>
</div>

<script>
  if (window.lucide) lucide.createIcons();

  // ══ CONFIG — sama dengan API_URL di halaman lain ══
  const API_URL = 'https://script.google.com/macros/s/AKfycbzk8A4xuXOVGqbK6a4zffpG6u2s4jVROZwIitmCDat2fYU7qyU3VkxQJmtxtEtjQxji/exec';

  // Ambil sesi login
  let SESSION = null;
  try { SESSION = JSON.parse(sessionStorage.getItem('gudanghub_session') || 'null'); } catch(e) {}

  if (!SESSION || new Date(SESSION.expires) < new Date()) {
    // Belum login → ke halaman login
    window.location.href = 'login.html';
  } else {
    // Tampilkan identitas & atur tombol kembali sesuai peran
    document.getElementById('whoBox').style.display = 'flex';
    document.getElementById('whoNama').textContent = SESSION.nama || SESSION.username;
    document.getElementById('whoUser').textContent = '@' + SESSION.username;
    document.getElementById('whoAv').textContent = (SESSION.nama || SESSION.username || '?').charAt(0).toUpperCase();
    document.getElementById('backLink').href = SESSION.role === 'admin'
      ? 'dashboard.html'
      : 'order.html?cabang=' + encodeURIComponent(SESSION.idCabang || '');
  }

  function tog(id, btn) {
    const inp = document.getElementById(id);
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.innerHTML = `<i data-lucide="${show ? 'eye-off' : 'eye'}" width="18" height="18"></i>`;
    if (window.lucide) lucide.createIcons();
  }

  function showMsg(kind, text) {
    const err = document.getElementById('errMsg'), ok = document.getElementById('okMsg');
    err.classList.remove('show'); ok.classList.remove('show');
    if (kind === 'err') { document.getElementById('errText').textContent = text; err.classList.add('show'); }
    else { document.getElementById('okText').textContent = text; ok.classList.add('show'); }
  }

  function resetBtn() {
    const btn = document.getElementById('btn');
    btn.classList.remove('loading');
    document.getElementById('btnText').innerHTML = '<i data-lucide="save" width="18" height="18"></i> Simpan Password Baru';
    if (window.lucide) lucide.createIcons();
  }

  function parseResp(text) {
    if (!text) return { status:'error', message:'Response kosong.' };
    try { return JSON.parse(text); } catch(e) {}
    try { const m = text.match(/\{[\s\S]*\}/); if (m) return JSON.parse(m[0]); } catch(e) {}
    return { status:'error', message:'Response tidak valid.' };
  }

  async function kirim(payload) {
    const enc = encodeURIComponent(JSON.stringify(payload));
    try {
      const res = await fetch(`${API_URL}?action=changePassword&payload=${enc}`, { method: 'GET' });
      const d = parseResp(await res.text());
      if (d.status) return d;
    } catch(e) {}
    try {
      const form = new FormData(); form.append('payload', JSON.stringify(payload));
      const res = await fetch(`${API_URL}?action=changePassword`, { method: 'POST', body: form });
      const d = parseResp(await res.text());
      if (d.status) return d;
    } catch(e) {}
    return { status:'error', message:'Gagal terhubung ke server.' };
  }

  async function submitGanti(e) {
    e.preventDefault();
    if (!SESSION) return;

    const lama  = document.getElementById('passLama').value;
    const baru  = document.getElementById('passBaru').value;
    const ulang = document.getElementById('passUlang').value;

    if (baru.length < 6) { showMsg('err', 'Password baru minimal 6 karakter.'); return; }
    if (baru !== ulang)  { showMsg('err', 'Ulangi password tidak sama.'); return; }
    if (baru === lama)   { showMsg('err', 'Password baru harus berbeda dari yang lama.'); return; }

    const btn = document.getElementById('btn');
    btn.classList.add('loading');
    document.getElementById('btnText').innerHTML = '<span class="spinner"></span> Menyimpan...';

    const hasil = await kirim({
      action: 'changePassword',
      username: SESSION.username,
      passwordLama: lama,
      passwordBaru: baru
    });

    if (hasil.status === 'ok') {
      showMsg('ok', 'Password berhasil diubah. Silakan pakai password baru saat login berikutnya.');
      document.querySelector('form').reset();
      resetBtn();
    } else {
      showMsg('err', hasil.message || 'Gagal mengubah password.');
      resetBtn();
      const card = document.getElementById('card');
      card.style.animation = 'shake 0.4s ease';
      setTimeout(() => card.style.animation = '', 400);
    }
  }
</script>
</body>
</html>
