<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
  <meta name="theme-color" content="#0d0d1a">
  <title>GudangHub — Ganti Password</title>

  <link rel="manifest" href="/gudanghub/assets/manifest-DWsLcWLB.json">
  <link rel="apple-touch-icon" href="./public/icons/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      padding-top: max(24px, var(--safe-top));
      padding-right: max(24px, var(--safe-right));
      padding-bottom: max(24px, var(--safe-bottom));
      padding-left: max(24px, var(--safe-left));
      position: relative;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(50vw 50vw at 85% 12%, rgba(255, 107, 0, 0.10), transparent 60%),
        radial-gradient(45vw 45vw at 8% 95%, rgba(255, 107, 0, 0.07), transparent 60%);
    }

    .password-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 440px;
      padding: clamp(24px, 4vw, 34px);
      border: 1px solid var(--line-soft);
      border-radius: clamp(18px, 3vw, 26px);
      background: linear-gradient(150deg, #17171f 0%, #121219 60%, #191118 100%);
      box-shadow: 0 50px 120px -30px rgba(0, 0, 0, 0.8);
    }

    .password-card.shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .brand-mark {
      display: grid;
      width: 40px;
      height: 40px;
      place-items: center;
      flex-shrink: 0;
      border-radius: 11px;
      background: linear-gradient(140deg, var(--orange), var(--orange-deep));
      color: #fff;
      box-shadow: 0 6px 18px rgba(255, 107, 0, 0.4);
    }

    .brand-name {
      font-family: var(--font-serif);
      font-size: clamp(17px, 2vw, 20px);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .brand-name em {
      color: var(--orange);
      font-style: normal;
    }

    .back-link {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      padding: 8px 12px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      transition: color 0.15s, background 0.15s;
      text-decoration: none;
    }

    .back-link:hover,
    .back-link:focus-visible {
      background: rgba(255, 255, 255, 0.03);
      color: var(--orange);
      outline: none;
    }

    .page-title {
      margin-bottom: 8px;
      font-family: var(--font-serif);
      font-size: clamp(24px, 4vw, 30px);
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.1;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-title em {
      color: var(--orange);
      font-style: italic;
    }

    .page-description {
      margin: 8px 0 24px;
      color: var(--muted);
      font-size: clamp(13px, 1.6vw, 14px);
    }

    /* USER SUMMARY */
    .user-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      padding: 12px 14px;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      background: var(--field);
    }

    .user-avatar {
      display: grid;
      width: 40px;
      height: 40px;
      place-items: center;
      flex-shrink: 0;
      border-radius: 50%;
      background: linear-gradient(140deg, var(--orange), var(--orange-deep));
      color: #fff;
      font-size: 16px;
      font-weight: 700;
    }

    .user-details {
      min-width: 0;
      flex: 1;
    }

    .user-name,
    .user-username {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .user-name {
      font-size: 14px;
      font-weight: 700;
    }

    .user-username {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    /* MESSAGE */
    .message {
      display: none;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 16px;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    .message.show { display: flex; }

    .message.error {
      border: 1px solid rgba(239, 68, 68, 0.3);
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
    }

    .message.success {
      border: 1px solid rgba(34, 197, 94, 0.3);
      background: rgba(34, 197, 94, 0.1);
      color: #4ade80;
    }

    .message-icon {
      flex-shrink: 0;
      margin-top: 1px;
      display: grid;
      place-items: center;
    }

    /* FIELDS */
    .field-group {
      margin-bottom: 18px;
    }

    .field-label {
      display: block;
      margin-bottom: 9px;
      font-size: 13px;
      font-weight: 700;
    }

    .field {
      position: relative;
    }

    .field-icon {
      position: absolute;
      top: 50%;
      left: 15px;
      color: var(--muted);
      pointer-events: none;
      transform: translateY(-50%);
      z-index: 1;
      display: grid;
      place-items: center;
    }

    .password-input {
      width: 100%;
      min-height: 50px;
      padding: 15px 46px 15px 42px;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      outline: none;
      background: var(--field);
      color: var(--text);
      font-size: 15px;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
    }

    .password-input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.14);
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 10px;
      display: grid;
      min-width: 36px;
      min-height: 36px;
      place-items: center;
      padding: 8px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      transform: translateY(-50%);
      transition: color 0.15s, background 0.15s;
      cursor: pointer;
    }

    .toggle-password:hover,
    .toggle-password:focus-visible {
      background: rgba(255, 255, 255, 0.03);
      color: var(--orange);
      outline: none;
    }

    .password-hint {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    /* STRENGTH METER */
    .strength-meter {
      margin-top: 8px;
      height: 4px;
      background: var(--field);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      background: var(--danger);
      transition: width 0.3s ease, background 0.3s ease;
    }

    .strength-label {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .strength-label b {
      font-weight: 700;
    }

    .strength-weak    { color: var(--danger); }
    .strength-medium  { color: var(--warning); }
    .strength-strong  { color: var(--success); }

    /* SUBMIT BUTTON */
    .submit-button {
      display: flex;
      width: 100%;
      min-height: 50px;
      align-items: center;
      justify-content: center;
      gap: 9px;
      margin-top: 6px;
      padding: 15px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      box-shadow: 0 8px 25px rgba(255, 107, 0, 0.35);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.2s var(--ease-spring), box-shadow 0.2s, opacity 0.2s;
    }

    .submit-button:hover,
    .submit-button:focus-visible {
      box-shadow: 0 12px 30px rgba(255, 107, 0, 0.5);
      transform: translateY(-2px);
      outline: none;
    }

    .submit-button:active {
      transform: translateY(0);
    }

    .submit-button.loading {
      pointer-events: none;
      opacity: 0.75;
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      body { padding: 16px; }
      .password-card { border-radius: 18px; }
      .password-input { font-size: 16px; }
      .topbar { gap: 10px; }
      .back-link { padding: 6px 10px; font-size: 12px; }
    }

    @media (max-width: 360px) {
      .password-card { padding: 20px; }
      .page-title { font-size: 22px; }
      .brand-name { font-size: 15px; }
      .password-input { padding: 14px 42px 14px 40px; }
    }
  </style>
  <script type="module" crossorigin src="/gudanghub/assets/js/gantiPassword-E2tTitLS.js"></script>
  <link rel="modulepreload" crossorigin href="/gudanghub/assets/js/icons-DdqG2uRW.js">
  <link rel="modulepreload" crossorigin href="/gudanghub/assets/js/api-DBPU_7n9.js">
  <link rel="modulepreload" crossorigin href="/gudanghub/assets/js/ui-CDv0hAY9.js">
  <link rel="stylesheet" crossorigin href="/gudanghub/assets/css/icons-BrzFGbpM.css">
</head>

<body>

  <div class="bg-glow" aria-hidden="true"></div>

  <main class="password-card" id="passwordCard">

    <header class="topbar">
      <div class="brand-mark">
        <span data-icon="warehouse" data-icon-size="20"></span>
      </div>
      <div class="brand-name">
        Gudang<em>Hub</em>
      </div>
      <a class="back-link" id="backLink" href="./dashboard.html">
        <span data-icon="arrow-left" data-icon-size="16"></span>
        Kembali
      </a>
    </header>

    <h1 class="page-title">
      <span data-icon="key" data-icon-size="28" data-icon-color="var(--orange)"></span>
      Ganti <em>Password</em>
    </h1>
    <p class="page-description">
      Perbarui password akun Anda. Minimal 6 karakter.
    </p>

    <section class="user-summary" id="userSummary" aria-label="Identitas pengguna">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-details">
        <div class="user-name" id="userName">-</div>
        <div class="user-username" id="userUsername">-</div>
      </div>
    </section>

    <div class="message error" id="errorMessage" role="alert">
      <span class="message-icon" data-icon="alert-circle" data-icon-size="16"></span>
      <span id="errorText"></span>
    </div>

    <div class="message success" id="successMessage" role="status">
      <span class="message-icon" data-icon="check-circle" data-icon-size="16"></span>
      <span id="successText"></span>
    </div>

    <form id="passwordForm" autocomplete="on" novalidate>

      <div class="field-group">
        <label class="field-label" for="oldPassword">
          Password Lama
        </label>
        <div class="field">
          <span class="field-icon" data-icon="lock" data-icon-size="18"></span>
          <input
            class="password-input"
            id="oldPassword"
            type="password"
            placeholder="Password saat ini"
            autocomplete="current-password"
            required
          >
          <button
            class="toggle-password"
            type="button"
            data-target="oldPassword"
            aria-label="Tampilkan password lama"
          >
            <span data-icon="eye" data-icon-size="18"></span>
          </button>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="newPassword">
          Password Baru
        </label>
        <div class="field">
          <span class="field-icon" data-icon="key" data-icon-size="18"></span>
          <input
            class="password-input"
            id="newPassword"
            type="password"
            placeholder="Minimal 6 karakter"
            minlength="6"
            autocomplete="new-password"
            required
          >
          <button
            class="toggle-password"
            type="button"
            data-target="newPassword"
            aria-label="Tampilkan password baru"
          >
            <span data-icon="eye" data-icon-size="18"></span>
          </button>
        </div>

        <div class="strength-meter" aria-hidden="true">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
        <div class="strength-label">
          <span>Kekuatan password:</span>
          <b id="strengthLabel" class="strength-weak">-</b>
        </div>

        <p class="password-hint">
          <span data-icon="info" data-icon-size="14"></span>
          Gunakan kombinasi huruf besar, kecil, angka, dan simbol.
        </p>
      </div>

      <div class="field-group">
        <label class="field-label" for="confirmPassword">
          Ulangi Password Baru
        </label>
        <div class="field">
          <span class="field-icon" data-icon="shield-check" data-icon-size="18"></span>
          <input
            class="password-input"
            id="confirmPassword"
            type="password"
            placeholder="Ketik ulang password baru"
            minlength="6"
            autocomplete="new-password"
            required
          >
          <button
            class="toggle-password"
            type="button"
            data-target="confirmPassword"
            aria-label="Tampilkan password ulang"
          >
            <span data-icon="eye" data-icon-size="18"></span>
          </button>
        </div>
      </div>

      <button class="submit-button" id="submitButton" type="submit">
        <span id="submitButtonText" style="display: inline-flex; align-items: center; gap: 8px;">
          <span data-icon="save" data-icon-size="18"></span>
          Simpan Password Baru
        </span>
      </button>
    </form>
  </main>

</body>
</html>
