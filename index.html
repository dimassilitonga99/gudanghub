<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GudangHub — Order Barang</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --orange:#ff6b00;--orange-light:#ff8c38;--orange-dim:rgba(255,107,0,0.12);
      --dark:#0d0d1a;--dark2:#12122a;--dark3:#1a1a35;
      --card:#1e1e3a;--card2:#22223f;
      --border:rgba(255,107,0,0.18);--border2:rgba(255,255,255,0.06);
      --text:#e2e8f0;--muted:#94a3b8;
      --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
    }
    body{background:var(--dark);color:var(--text);
         font-family:'Segoe UI',system-ui,sans-serif;
         min-height:100vh;padding-bottom:160px;}

    /* ── TOPBAR ── */
    .topbar{
      background:var(--dark2);border-bottom:1px solid var(--border);
      padding:0 16px;display:flex;align-items:center;
      gap:12px;height:60px;position:sticky;top:0;z-index:200;
    }
    .topbar-logo{
      width:36px;height:36px;
      background:linear-gradient(135deg,var(--orange),var(--orange-light));
      border-radius:10px;display:flex;align-items:center;
      justify-content:center;font-size:18px;flex-shrink:0;
    }
    .topbar-title{font-size:16px;font-weight:800;
      background:linear-gradient(135deg,#fff,var(--orange-light));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;}
    .topbar-cabang{
      margin-left:auto;
      background:var(--orange-dim);border:1px solid var(--border);
      border-radius:20px;padding:6px 14px;
      font-size:12px;font-weight:700;color:var(--orange);
      display:flex;align-items:center;gap:6px;
    }
    .btn-logout-top{
      background:rgba(255,255,255,0.05);
      border:1px solid var(--border2);
      border-radius:8px;padding:6px 10px;
      color:var(--muted);font-size:12px;cursor:pointer;
      transition:all 0.2s;
    }
    .btn-logout-top:hover{color:var(--red);border-color:rgba(239,68,68,0.3);}

    /* ── SEARCH & FILTER ── */
    .search-wrap{padding:16px;position:sticky;top:60px;
                 z-index:100;background:var(--dark);}
    .search-box{
      display:flex;gap:10px;align-items:center;
      background:var(--card);border:1px solid var(--border2);
      border-radius:14px;padding:10px 16px;margin-bottom:12px;
    }
    .search-box input{
      flex:1;background:none;border:none;outline:none;
      color:var(--text);font-size:14px;
    }
    .search-box input::placeholder{color:var(--muted);}
    .search-icon{font-size:16px;opacity:0.5;}

    .filter-scroll{
      display:flex;gap:8px;overflow-x:auto;
      padding-bottom:4px;scrollbar-width:none;
    }
    .filter-scroll::-webkit-scrollbar{display:none;}
    .filter-chip{
      background:var(--card);border:1px solid var(--border2);
      border-radius:20px;padding:6px 16px;
      font-size:12px;font-weight:600;color:var(--muted);
      cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;
    }
    .filter-chip:hover{color:var(--text);}
    .filter-chip.active{
      background:var(--orange-dim);border-color:var(--orange);
      color:var(--orange);
    }

    /* ── KATALOG GRID ── */
    .section-label{
      padding:8px 16px 4px;font-size:11px;color:var(--muted);
      font-weight:600;text-transform:uppercase;letter-spacing:0.5px;
    }
    .katalog-grid{
      display:grid;grid-template-columns:repeat(2,1fr);
      gap:12px;padding:8px 16px;
    }
    @media(min-width:480px){.katalog-grid{grid-template-columns:repeat(3,1fr);}}
    @media(min-width:768px){.katalog-grid{grid-template-columns:repeat(4,1fr);}}

    .item-card{
      background:var(--card);border:1px solid var(--border2);
      border-radius:14px;padding:14px;cursor:pointer;
      transition:all 0.2s;position:relative;overflow:hidden;
    }
    .item-card:hover{
      border-color:var(--orange);
      transform:translateY(-2px);
      box-shadow:0 8px 24px rgba(0,0,0,0.3);
    }
    .item-card.in-cart{border-color:rgba(34,197,94,0.4);}
    .item-emoji{font-size:32px;margin-bottom:8px;display:block;}
    .item-kode{font-size:10px;color:var(--orange);font-weight:700;
               font-family:monospace;margin-bottom:4px;}
    .item-nama{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:4px;}
    .item-kat{font-size:10px;color:var(--muted);margin-bottom:8px;}
    .item-harga{font-size:13px;font-weight:800;color:var(--orange);}
    .item-satuan{font-size:10px;color:var(--muted);}
    .item-stok{
      position:absolute;top:10px;right:10px;
      font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;
    }
    .stok-ok{background:rgba(34,197,94,0.15);color:var(--green);}
    .stok-low{background:rgba(245,158,11,0.15);color:var(--yellow);}

    .qty-wrap{
      display:flex;align-items:center;gap:6px;margin-top:10px;
    }
    .qty-btn{
      width:26px;height:26px;border-radius:8px;border:none;
      background:var(--dark3);color:var(--text);font-size:16px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all 0.15s;
    }
    .qty-btn:hover{background:var(--orange);color:#fff;}
    .qty-num{
      flex:1;text-align:center;font-size:13px;font-weight:700;
      background:var(--dark3);border-radius:6px;
      padding:4px;border:none;outline:none;color:var(--text);
    }
    .btn-add{
      width:100%;margin-top:8px;padding:8px;border-radius:10px;
      border:none;
      background:linear-gradient(135deg,var(--orange),var(--orange-light));
      color:#fff;font-size:12px;font-weight:700;cursor:pointer;
      transition:all 0.2s;
    }
    .btn-add:hover{opacity:0.9;transform:translateY(-1px);}
    .btn-add.added{background:linear-gradient(135deg,var(--green),#16a34a);}

    /* Empty state */
    .empty-state{
      text-align:center;padding:60px 20px;color:var(--muted);
    }
    .empty-state .ei{font-size:48px;margin-bottom:12px;}

    /* ── CART BOTTOM SHEET ── */
    .cart-bar{
      position:fixed;bottom:72px;left:0;right:0;
      padding:12px 16px;z-index:300;
    }
    .cart-btn{
      background:linear-gradient(135deg,var(--orange),var(--orange-light));
      border:none;border-radius:16px;padding:14px 20px;
      width:100%;color:#fff;font-size:15px;font-weight:800;
      cursor:pointer;display:flex;align-items:center;
      justify-content:space-between;
      box-shadow:0 8px 30px rgba(255,107,0,0.4);
      transition:all 0.2s;
    }
    .cart-btn:hover{transform:translateY(-2px);}
    .cart-count{
      background:rgba(255,255,255,0.25);
      border-radius:20px;padding:3px 12px;font-size:13px;
    }

    /* Bottom sheet overlay */
    .sheet-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,0.7);
      z-index:400;opacity:0;pointer-events:none;
      transition:opacity 0.3s;backdrop-filter:blur(4px);
    }
    .sheet-overlay.show{opacity:1;pointer-events:all;}

    .bottom-sheet{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--dark2);border-radius:24px 24px 0 0;
      border-top:1px solid var(--border);
      max-height:85vh;overflow-y:auto;
      z-index:500;
      transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
    }
    .bottom-sheet.show{transform:translateY(0);}
    .sheet-handle{
      width:40px;height:4px;background:rgba(255,255,255,0.15);
      border-radius:2px;margin:12px auto 0;
    }
    .sheet-header{
      padding:16px 20px;border-bottom:1px solid var(--border2);
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;background:var(--dark2);z-index:1;
    }
    .sheet-title{font-size:16px;font-weight:800;}
    .sheet-close{
      background:rgba(255,255,255,0.08);border:none;
      width:32px;height:32px;border-radius:8px;
      color:var(--muted);font-size:16px;cursor:pointer;transition:all 0.2s;
    }
    .sheet-close:hover{background:var(--red);color:#fff;}

    /* Cart items */
    .cart-items{padding:12px 16px;}
    .cart-item{
      display:flex;align-items:center;gap:12px;
      padding:12px 0;border-bottom:1px solid var(--border2);
    }
    .cart-item:last-child{border-bottom:none;}
    .ci-info{flex:1;min-width:0;}
    .ci-nama{font-size:13px;font-weight:700;
             white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ci-kode{font-size:10px;color:var(--orange);font-family:monospace;}
    .ci-harga{font-size:12px;color:var(--muted);}
    .ci-sub{font-size:13px;font-weight:800;color:var(--orange);min-width:80px;text-align:right;}
    .ci-qty{
      display:flex;align-items:center;gap:6px;
    }
    .ci-qty-btn{
      width:26px;height:26px;border-radius:7px;border:none;
      background:var(--dark3);color:var(--text);font-size:14px;
      cursor:pointer;transition:all 0.15s;
    }
    .ci-qty-btn:hover{background:var(--orange);color:#fff;}
    .ci-qty-num{
      width:32px;text-align:center;font-size:13px;
      font-weight:700;background:var(--dark3);
      border-radius:6px;padding:3px;border:none;
      outline:none;color:var(--text);
    }
    .ci-del{
      background:none;border:none;color:var(--muted);
      font-size:16px;cursor:pointer;padding:4px;transition:color 0.2s;
    }
    .ci-del:hover{color:var(--red);}

    .cart-empty{
      text-align:center;padding:40px;color:var(--muted);
    }

    /* Cart summary */
    .cart-summary{
      padding:16px 20px;
      background:var(--dark3);
      border-top:1px solid var(--border2);
      position:sticky;bottom:0;
    }
    .summary-row{
      display:flex;justify-content:space-between;
      font-size:13px;margin-bottom:6px;
    }
    .summary-total{
      display:flex;justify-content:space-between;
      font-size:16px;font-weight:800;
      color:var(--orange);margin:10px 0;
      padding-top:10px;border-top:1px solid var(--border);
    }
    .catatan-input{
      width:100%;background:var(--dark);border:1px solid var(--border2);
      border-radius:10px;padding:10px 14px;color:var(--text);
      font-size:13px;font-family:inherit;resize:none;outline:none;
      transition:border-color 0.2s;margin-bottom:12px;
    }
    .catatan-input:focus{border-color:var(--orange);}
    .btn-submit{
      width:100%;padding:15px;border-radius:14px;border:none;
      background:linear-gradient(135deg,var(--orange),var(--orange-light));
      color:#fff;font-size:15px;font-weight:800;cursor:pointer;
      transition:all 0.2s;
    }
    .btn-submit:hover{opacity:0.9;transform:translateY(-1px);}
    .btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

    /* ── BOTTOM NAV ── */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--dark2);border-top:1px solid var(--border2);
      display:flex;height:65px;z-index:200;
    }
    .nav-tab{
      flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:4px;cursor:pointer;
      color:var(--muted);font-size:10px;font-weight:600;
      transition:all 0.2s;border:none;background:none;
    }
    .nav-tab .nt-icon{font-size:20px;}
    .nav-tab.active{color:var(--orange);}
    .nav-tab:hover{color:var(--text);}

    /* ── RIWAYAT ── */
    .riwayat-list{padding:16px;}
    .riwayat-item{
      background:var(--card);border:1px solid var(--border2);
      border-radius:14px;padding:16px;margin-bottom:12px;
    }
    .riwayat-header{
      display:flex;align-items:center;gap:10px;margin-bottom:8px;
    }
    .riwayat-id{
      font-size:11px;font-family:monospace;color:var(--orange);
      font-weight:700;flex:1;
    }
    .status-badge{
      padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;
    }
    .status-pending{background:rgba(245,158,11,0.15);color:var(--yellow);}
    .status-approved{background:rgba(34,197,94,0.15);color:var(--green);}
    .status-rejected{background:rgba(239,68,68,0.15);color:var(--red);}
    .riwayat-tgl{font-size:11px;color:var(--muted);margin-bottom:6px;}
    .riwayat-items{font-size:12px;color:var(--muted);}

    /* ── TOAST ── */
    .toast-wrap{
      position:fixed;top:70px;left:50%;transform:translateX(-50%);
      z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;
      pointer-events:none;
    }
    .toast{
      background:var(--card);border:1px solid var(--border);
      border-radius:12px;padding:12px 20px;font-size:13px;font-weight:600;
      display:flex;align-items:center;gap:8px;
      box-shadow:0 8px 24px rgba(0,0,0,0.4);
      opacity:0;transform:translateY(-10px);
      transition:all 0.3s;pointer-events:none;
      white-space:nowrap;
    }
    .toast.show{opacity:1;transform:translateY(0);}
    .toast.success{border-color:rgba(34,197,94,0.4);}
    .toast.error{border-color:rgba(239,68,68,0.4);}

    /* ── LOADING ── */
    .loading-wrap{
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:60px 20px;gap:16px;color:var(--muted);
    }
    .spinner{
      width:36px;height:36px;border:3px solid var(--border2);
      border-top-color:var(--orange);border-radius:50%;
      animation:spin 0.7s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Scrollbar */
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(255,107,0,0.3);border-radius:2px;}
  </style>
</head>
<body>

<!-- Toast -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">🏪</div>
  <div class="topbar-title">GudangHub</div>
  <div class="topbar-cabang" id="topbarCabang">
    🏬 <span id="cabangLabel">Memuat...</span>
  </div>
  <button class="btn-logout-top" onclick="doLogout()">Keluar 🚪</button>
</div>

<!-- HALAMAN: KATALOG -->
<div id="pageKatalog">
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput"
             placeholder="Cari kode atau nama barang..."
             oninput="filterKatalog()"/>
    </div>
    <div class="filter-scroll" id="filterScroll">
      <div class="filter-chip active" onclick="setKategori('',this)">Semua</div>
    </div>
  </div>
  <div class="section-label" id="sectionLabel">Katalog Barang — 0 item</div>
  <div class="katalog-grid" id="katalogGrid">
    <div class="loading-wrap" style="grid-column:1/-1">
      <div class="spinner"></div>
      <div>Memuat katalog...</div>
    </div>
  </div>
</div>

<!-- HALAMAN: RIWAYAT -->
<div id="pageRiwayat" style="display:none;">
  <div style="padding:16px 16px 8px;">
    <div style="font-size:18px;font-weight:800;">📋 Riwayat Order</div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px;">
      Semua order dari cabang ini
    </div>
  </div>
  <div class="riwayat-list" id="riwayatList">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div>Memuat riwayat...</div>
    </div>
  </div>
</div>

<!-- CART BUTTON -->
<div class="cart-bar" id="cartBar" style="display:none;">
  <button class="cart-btn" onclick="openCart()">
    <span>🛒 Lihat Keranjang</span>
    <span class="cart-count" id="cartCount">0 item</span>
  </button>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-tab active" id="tab-katalog" onclick="showTab('katalog')">
    <span class="nt-icon">🛍️</span>Katalog
  </button>
  <button class="nav-tab" id="tab-riwayat" onclick="showTab('riwayat')">
    <span class="nt-icon">📋</span>Riwayat
  </button>
</div>

<!-- SHEET OVERLAY -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeCart()"></div>

<!-- CART BOTTOM SHEET -->
<div class="bottom-sheet" id="cartSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">🛒 Keranjang Order</div>
    <button class="sheet-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-summary">
    <div class="summary-row">
      <span style="color:var(--muted)">Total Item</span>
      <span id="sumItem">0 item</span>
    </div>
    <div class="summary-total">
      <span>Total Order</span>
      <span id="sumTotal">Rp 0</span>
    </div>
    <textarea class="catatan-input" id="catatanInput"
              placeholder="Catatan untuk admin gudang (opsional)..."
              rows="2"></textarea>
    <button class="btn-submit" id="btnSubmit" onclick="submitOrder()">
      🚀 Kirim Order ke Gudang
    </button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════
const API_URL = 'GANTI_DENGAN_URL_WEB_APP_ANDA';

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let semuaBarang   = [];
let tampilBarang  = [];
let cart          = {};
let kategoriAktif = '';
let sessionData   = null;
let idCabang      = '';
let namaCabang    = '';
let picCabang     = '';

// ════════════════════════════════════════════════════════
//  SESSION — Baca dari login.html
// ════════════════════════════════════════════════════════
function initSession() {
  // Coba baca session
  const raw = sessionStorage.getItem('gudanghub_session');

  if (!raw) {
    // Tidak ada session → cek URL param (fallback)
    const params  = new URLSearchParams(window.location.search);
    const urlCab  = params.get('cabang');
    if (urlCab) {
      // Buat session darurat dari URL param
      idCabang   = urlCab.toUpperCase();
      namaCabang = getNamaCabang(idCabang);
      picCabang  = getPicCabang(idCabang);
    } else {
      // Tidak ada session & tidak ada URL param → redirect ke login
      window.location.href = 'login.html';
      return false;
    }
  } else {
    try {
      sessionData = JSON.parse(raw);

      // Cek apakah session sudah expired
      if (new Date(sessionData.expires) < new Date()) {
        sessionStorage.removeItem('gudanghub_session');
        window.location.href = 'login.html';
        return false;
      }

      // Ambil data cabang dari session
      if (sessionData.role === 'admin') {
        // Admin tidak seharusnya di sini, redirect ke dashboard
        window.location.href = 'dashboard.html';
        return false;
      }

      idCabang   = sessionData.idCabang  || '';
      namaCabang = sessionData.nama      || getNamaCabang(idCabang);
      picCabang  = sessionData.username  || '';

      if (!idCabang) {
        window.location.href = 'login.html';
        return false;
      }

    } catch(e) {
      window.location.href = 'login.html';
      return false;
    }
  }

  // Update UI
  document.getElementById('cabangLabel').textContent = idCabang + ' · ' + getPicCabang(idCabang);
  return true;
}

// Helper nama cabang lokal (fallback jika API belum load)
function getNamaCabang(id) {
  const map = {
    CB001: 'Toko Nasional Eltari – Arfa',
    CB002: 'Toko Perabot Mama Oesapa – Akmal',
    CB003: 'Toko Perabot Mama TDM – Shally',
    CB004: 'Toko Perabot Mama Kefamenanu – Fajar'
  };
  return map[id] || id;
}
function getPicCabang(id) {
  const map = { CB001:'Arfa', CB002:'Akmal', CB003:'Shally', CB004:'Fajar' };
  return map[id] || id;
}

// ════════════════════════════════════════════════════════
//  LOGOUT
// ════════════════════════════════════════════════════════
function doLogout() {
  if (confirm('Yakin ingin keluar?')) {
    sessionStorage.removeItem('gudanghub_session');
    window.location.href = 'login.html';
  }
}

// ════════════════════════════════════════════════════════
//  TABS
// ════════════════════════════════════════════════════════
function showTab(tab) {
  document.getElementById('pageKatalog').style.display  = tab === 'katalog'  ? '' : 'none';
  document.getElementById('pageRiwayat').style.display  = tab === 'riwayat'  ? '' : 'none';
  document.getElementById('tab-katalog').classList.toggle('active',  tab === 'katalog');
  document.getElementById('tab-riwayat').classList.toggle('active',  tab === 'riwayat');
  if (tab === 'riwayat') loadRiwayat();
}

// ════════════════════════════════════════════════════════
//  LOAD KATALOG
// ════════════════════════════════════════════════════════
async function loadKatalog() {
  try {
    const res  = await fetch(`${API_URL}?action=getBarang`);
    const data = await res.json();

    if (data.status === 'ok' && data.data.length > 0) {
      semuaBarang  = data.data;
      tampilBarang = [...semuaBarang];
      buildFilterKategori();
      renderKatalog();
    } else {
      // Tampilkan pesan kosong yang jelas
      document.getElementById('katalogGrid').innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="ei">📦</div>
          <p style="font-weight:700;margin-bottom:8px;">Katalog Masih Kosong</p>
          <p style="font-size:12px;">Minta admin untuk mengisi data barang<br>di sheet MASTER_BARANG</p>
        </div>`;
      document.getElementById('sectionLabel').textContent = 'Katalog Barang — 0 item';
    }
  } catch(err) {
    console.error('loadKatalog error:', err);
    document.getElementById('katalogGrid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="ei">⚠️</div>
        <p style="font-weight:700;margin-bottom:8px;">Gagal Memuat Katalog</p>
        <p style="font-size:12px;">Periksa koneksi internet<br>dan pastikan API_URL sudah diisi dengan benar</p>
        <button onclick="loadKatalog()" style="margin-top:16px;padding:10px 24px;
          background:var(--orange);border:none;border-radius:10px;
          color:#fff;font-weight:700;cursor:pointer;font-size:13px;">
          🔄 Coba Lagi
        </button>
      </div>`;
  }
}

function buildFilterKategori() {
  const kategori = [...new Set(semuaBarang.map(b => b.KATEGORI).filter(Boolean))];
  const wrap     = document.getElementById('filterScroll');
  wrap.innerHTML = `<div class="filter-chip active" onclick="setKategori('',this)">Semua</div>`;
  kategori.forEach(k => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip';
    chip.textContent = k;
    chip.onclick = () => setKategori(k, chip);
    wrap.appendChild(chip);
  });
}

function setKategori(kat, el) {
  kategoriAktif = kat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filterKatalog();
}

function filterKatalog() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  tampilBarang = semuaBarang.filter(b => {
    const matchKat = !kategoriAktif || b.KATEGORI === kategoriAktif;
    const matchQ   = !q ||
      String(b.KODE_BARANG  || '').toLowerCase().includes(q) ||
      String(b.NAMA_BARANG  || '').toLowerCase().includes(q) ||
      String(b.KATEGORI     || '').toLowerCase().includes(q);
    return matchKat && matchQ;
  });
  renderKatalog();
}

// Emoji kategori
function getEmoji(kat) {
  const map = {
    'Kursi':'🪑','Meja':'🪞','Lemari':'🗄️','Sofa':'🛋️',
    'Kasur':'🛏️','Rak':'📚','Bufet':'🗃️','Meja Makan':'🍽️',
    'default':'📦'
  };
  return map[kat] || map['default'];
}

function renderKatalog() {
  const grid = document.getElementById('katalogGrid');
  document.getElementById('sectionLabel').textContent =
    `Katalog Barang — ${tampilBarang.length} item`;

  if (!tampilBarang.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="ei">🔍</div>
        <p>Barang tidak ditemukan</p>
      </div>`;
    return;
  }

  grid.innerHTML = tampilBarang.map(b => {
    const kode    = String(b.KODE_BARANG || '');
    const nama    = String(b.NAMA_BARANG || '');
    const kat     = String(b.KATEGORI   || '');
    const satuan  = String(b.SATUAN     || 'PCS');
    const harga   = parseFloat(b.HARGA) || 0;
    const stok    = parseInt(b.STOK)    || 0;
    const inCart  = cart[kode] ? 'in-cart' : '';
    const qtyVal  = cart[kode] ? cart[kode].qty : 1;
    const stokCls = stok > 5 ? 'stok-ok' : 'stok-low';

    return `
    <div class="item-card ${inCart}" id="card-${kode}">
      <span class="item-stok ${stokCls}">Stok: ${stok}</span>
      <span class="item-emoji">${getEmoji(kat)}</span>
      <div class="item-kode">${kode}</div>
      <div class="item-nama">${nama}</div>
      <div class="item-kat">${kat}</div>
      <div class="item-harga">${formatRp(harga)}</div>
      <div class="item-satuan">per ${satuan}</div>
      <div class="qty-wrap">
        <button class="qty-btn" onclick="changeQtyCard('${kode}',-1)">−</button>
        <input class="qty-num" type="number" min="1"
               id="qty-${kode}" value="${qtyVal}"
               onchange="setQtyCard('${kode}',this.value)"/>
        <button class="qty-btn" onclick="changeQtyCard('${kode}',1)">+</button>
      </div>
      <button class="btn-add ${cart[kode]?'added':''}"
              id="btn-${kode}"
              onclick="addToCart('${kode}','${nama}','${kat}',${harga},'${satuan}')">
        ${cart[kode] ? '✅ Di Keranjang' : '+ Tambah'}
      </button>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════════
//  CART
// ════════════════════════════════════════════════════════
function changeQtyCard(kode, delta) {
  const inp = document.getElementById('qty-' + kode);
  if (!inp) return;
  let val = parseInt(inp.value) + delta;
  if (val < 1) val = 1;
  inp.value = val;
  if (cart[kode]) {
    cart[kode].qty = val;
    updateCartUI();
  }
}

function setQtyCard(kode, val) {
  let v = parseInt(val);
  if (isNaN(v) || v < 1) v = 1;
  document.getElementById('qty-' + kode).value = v;
  if (cart[kode]) {
    cart[kode].qty = v;
    updateCartUI();
  }
}

function addToCart(kode, nama, kat, harga, satuan) {
  const qtyInput = document.getElementById('qty-' + kode);
  const qty = parseInt(qtyInput ? qtyInput.value : 1) || 1;

  if (cart[kode]) {
    cart[kode].qty = qty;
  } else {
    cart[kode] = { kode, nama, kat, harga, satuan, qty };
  }

  // Update card UI
  const card = document.getElementById('card-' + kode);
  const btn  = document.getElementById('btn-'  + kode);
  if (card) card.classList.add('in-cart');
  if (btn)  { btn.textContent = '✅ Di Keranjang'; btn.classList.add('added'); }

  updateCartUI();
  showToast('Ditambah ke keranjang', 'success');
}

function removeFromCart(kode) {
  delete cart[kode];
  // Reset card UI
  const card = document.getElementById('card-' + kode);
  const btn  = document.getElementById('btn-'  + kode);
  if (card) card.classList.remove('in-cart');
  if (btn)  { btn.textContent = '+ Tambah'; btn.classList.remove('added'); }
  updateCartUI();
  renderCartSheet();
}

function updateCartUI() {
  const items = Object.values(cart);
  const total = items.reduce((s, i) => s + i.qty * i.harga, 0);
  const count = items.reduce((s, i) => s + i.qty, 0);

  // Cart button
  const cartBar = document.getElementById('cartBar');
  if (items.length > 0) {
    cartBar.style.display = '';
    document.getElementById('cartCount').textContent =
      `${count} item · ${formatRp(total)}`;
  } else {
    cartBar.style.display = 'none';
  }

  // Summary
  document.getElementById('sumItem').textContent  = count + ' item';
  document.getElementById('sumTotal').textContent = formatRp(total);
}

function openCart() {
  renderCartSheet();
  document.getElementById('sheetOverlay').classList.add('show');
  document.getElementById('cartSheet').classList.add('show');
}

function closeCart() {
  document.getElementById('sheetOverlay').classList.remove('show');
  document.getElementById('cartSheet').classList.remove('show');
}

function renderCartSheet() {
  const items = Object.values(cart);
  const wrap  = document.getElementById('cartItems');

  if (!items.length) {
    wrap.innerHTML = `
      <div class="cart-empty">
        <div style="font-size:40px;margin-bottom:8px;">🛒</div>
        <div>Keranjang masih kosong</div>
      </div>`;
    return;
  }

  wrap.innerHTML = items.map(item => `
    <div class="cart-item">
      <div class="ci-info">
        <div class="ci-nama">${item.nama}</div>
        <div class="ci-kode">${item.kode}</div>
        <div class="ci-harga">${formatRp(item.harga)} / ${item.satuan}</div>
      </div>
      <div class="ci-qty">
        <button class="ci-qty-btn" onclick="ciQty('${item.kode}',-1)">−</button>
        <input class="ci-qty-num" type="number"
               value="${item.qty}" min="1"
               onchange="ciQtySet('${item.kode}',this.value)"/>
        <button class="ci-qty-btn" onclick="ciQty('${item.kode}',1)">+</button>
      </div>
      <div class="ci-sub">${formatRp(item.qty * item.harga)}</div>
      <button class="ci-del" onclick="removeFromCart('${item.kode}')">🗑</button>
    </div>`).join('');
}

function ciQty(kode, delta) {
  if (!cart[kode]) return;
  cart[kode].qty = Math.max(1, cart[kode].qty + delta);
  // Update input di cart sheet
  const inputs = document.querySelectorAll('.ci-qty-num');
  const items  = Object.values(cart);
  const idx    = items.findIndex(i => i.kode === kode);
  if (inputs[idx]) inputs[idx].value = cart[kode].qty;
  // Sync ke card juga
  const cardInp = document.getElementById('qty-' + kode);
  if (cardInp) cardInp.value = cart[kode].qty;
  updateCartUI();
  renderCartSheet();
}

function ciQtySet(kode, val) {
  if (!cart[kode]) return;
  const v = Math.max(1, parseInt(val) || 1);
  cart[kode].qty = v;
  const cardInp = document.getElementById('qty-' + kode);
  if (cardInp) cardInp.value = v;
  updateCartUI();
}

// ════════════════════════════════════════════════════════
//  SUBMIT ORDER
// ════════════════════════════════════════════════════════
async function submitOrder() {
  const items = Object.values(cart);
  if (!items.length) {
    showToast('Keranjang masih kosong!', 'error');
    return;
  }

  if (!idCabang) {
    showToast('Session tidak valid. Silakan login ulang.', 'error');
    setTimeout(() => window.location.href = 'login.html', 1500);
    return;
  }

  const catatan = document.getElementById('catatanInput').value.trim();
  const btn     = document.getElementById('btnSubmit');
  btn.disabled  = true;
  btn.textContent = '⏳ Mengirim order...';

  try {
    const payload = {
      action:    'submitOrder',
      idCabang:  idCabang,
      catatan:   catatan,
      items:     items.map(i => ({
        kode:     i.kode,
        nama:     i.nama,
        kategori: i.kat,
        qty:      i.qty,
        satuan:   i.satuan,
        harga:    i.harga
      }))
    };

    const res  = await fetch(API_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.status === 'ok') {
      // Reset cart
      cart = {};
      document.getElementById('catatanInput').value = '';
      closeCart();
      updateCartUI();
      renderKatalog();

      showToast('✅ Order berhasil dikirim! Email notifikasi terkirim ke admin.', 'success', 5000);

      // Refresh riwayat jika sedang di tab riwayat
      if (document.getElementById('pageRiwayat').style.display !== 'none') {
        loadRiwayat();
      }

    } else {
      showToast('❌ Gagal: ' + (data.message || 'Terjadi kesalahan'), 'error');
    }
  } catch(err) {
    console.error('submitOrder error:', err);
    showToast('❌ Gagal terhubung ke server. Cek koneksi.', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 Kirim Order ke Gudang';
  }
}

// ════════════════════════════════════════════════════════
//  RIWAYAT ORDER
// ════════════════════════════════════════════════════════
async function loadRiwayat() {
  const list = document.getElementById('riwayatList');
  list.innerHTML = `
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div>Memuat riwayat...</div>
    </div>`;

  try {
    const res  = await fetch(`${API_URL}?action=getOrders`);
    const data = await res.json();

    if (data.status !== 'ok') throw new Error(data.message);

    // Filter hanya order milik cabang ini
    const myOrders = (data.data || []).filter(o =>
      String(o.ID_CABANG || '').trim().toUpperCase() === idCabang.toUpperCase()
    );

    if (!myOrders.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="ei">📋</div>
          <p>Belum ada riwayat order</p>
        </div>`;
      return;
    }

    list.innerHTML = myOrders.map(o => {
      const statusCls = {
        PENDING:  'status-pending',
        APPROVED: 'status-approved',
        REJECTED: 'status-rejected'
      }[o.STATUS] || 'status-pending';

      const statusEmoji = {
        PENDING:  '⏳',
        APPROVED: '✅',
        REJECTED: '❌'
      }[o.STATUS] || '⏳';

      const detailText = (o.DETAIL || []).length > 0
        ? (o.DETAIL || []).slice(0,3).map(d =>
            `${d.KODE_BARANG} × ${d.QTY} ${d.SATUAN}`
          ).join(', ') + ((o.DETAIL.length > 3) ? ` +${o.DETAIL.length-3} lainnya` : '')
        : 'Detail tidak tersedia';

      return `
        <div class="riwayat-item">
          <div class="riwayat-header">
            <div class="riwayat-id">${o.ORDER_ID}</div>
            <span class="status-badge ${statusCls}">
              ${statusEmoji} ${o.STATUS}
            </span>
          </div>
          <div class="riwayat-tgl">🕐 ${o.TANGGAL_ORDER} WITA</div>
          <div class="riwayat-items">📦 ${detailText}</div>
          ${o.CATATAN ? `<div style="font-size:11px;color:var(--muted);margin-top:4px;">
            📝 ${o.CATATAN}</div>` : ''}
        </div>`;
    }).join('');

  } catch(err) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="ei">⚠️</div>
        <p>Gagal memuat riwayat</p>
        <button onclick="loadRiwayat()" style="margin-top:12px;padding:8px 20px;
          background:var(--orange);border:none;border-radius:10px;
          color:#fff;font-weight:700;cursor:pointer;font-size:13px;">
          🔄 Coba Lagi
        </button>
      </div>`;
  }
}

// ════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════
function showToast(msg, type = 'info', duration = 3000) {
  const wrap = document.getElementById('toastWrap');
  const el   = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => el.classList.add('show'));
  });
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 300);
  }, duration);
}

// ════════════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════════════
function formatRp(n) {
  return 'Rp ' + (parseFloat(n)||0).toLocaleString('id-ID');
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  // 1. Init session — redirect ke login jika tidak valid
  if (!initSession()) return;

  // 2. Load katalog dari API
  loadKatalog();
});
</script>
