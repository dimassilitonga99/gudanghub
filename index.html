<style>
*, *::sebelum, *::setelah {
  margin: 0;
  padding: 0;
  ukuran kotak: kotak-batas;
  -webkit-tap-highlight-color: transparan;
}

:akar {
  --oranye: #ff6b00;
  --cahaya-oranye: #ff8c38;
  --orange-deep: #e05a00;
  --tinta: #0c0c15;
  --ink2: #14141f;
  --ink3: #1c1c2b;
  --baris: rgba(255,255,255,0.09);
  --baris2: rgba(255,255,255,0.05);
  --teks: #ede8e2;
  --dibisukan: #9a958f;
  --space: clamp(56px, 9vw, 140px);
  --safe-top: env(safe-area-inset-top, 0);
  --safe-bottom: env(safe-area-inset-bottom, 0);
  --safe-left: env(safe-area-inset-left, 0);
  --safe-right: env(safe-area-inset-right, 0);
}

html {
  perilaku pengguliran: halus;
  latar belakang: var(--tinta);
  -webkit-text-size-adjust: 100%;
  Sesuaikan ukuran teks: 100%;
  overflow-x: tersembunyi;
}

tubuh {
  latar belakang: transparan;
  warna: var(--teks);
  font-family: 'Manrope', system-ui, -apple-system, sans-serif;
  Tinggi baris: 1,55;
  overflow-x: tersembunyi;
  min-height: 100dvh;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
}

/* TEKSTUR LATAR BELAKANG */
badan::sebelum {
  isi: '';
  posisi: tetap;
  sisipan: 0;
  indeks z: 0;
  pointer-events: none;
  gambar latar belakang:
    gradien linier(rgba(255,255,255,0.020) 1px, transparan 1px),
    gradien linier(90 derajat, rgba(255,255,255,0.020) 1px, transparan 1px);
  ukuran latar belakang: 46px 46px;
  akan berubah: bertransformasi;
}

badan::setelah {
  isi: '';
  posisi: tetap;
  sisipan: 0;
  indeks z: 0;
  pointer-events: none;
  latar belakang:
    radial-gradient(60vw 60vw pada 82% 8%, rgba(255,107,0,0.06), transparan 60%),
    gradien radial(50vw 50vw pada 12% 88%, rgba(255,107,0,0.05), transparan 60%);
}

::selection { background: var(--orange); color: #fff; }

h1, h2, h3, h4 {
  font-family: 'Fraunces', Georgia, serif;
  ketebalan font: 600;
  pembungkus teks: seimbang;
  spasi antar huruf: -0,01em;
  Tinggi baris: 1,1;
  overflow-wrap: break-word;
  pembungkus kata: pemisah kata;
}

img, svg { lebar maksimum: 100%; tinggi: otomatis; tampilan: blok; }

.membungkus {
  lebar maksimum: 1240px;
  margin: 0 otomatis;
  padding: 0 clamp(16px, 4vw, 48px);
  lebar: 100%;
}

a { warna: mewarisi; dekorasi teks: tidak ada; }

[data-lucide] { display: inline-block; vertical-align: middle; stroke-width: 1.6; }

.nav, .hero, .marquee, .steps, .showcase, .team, .about, .stats, .cabang, .cta, .footer {
  posisi: relatif;
  indeks z: 1;
}

.mengungkap {
  opasitas: 0;
  transformasi: translasiY(20px);
  transisi: opasitas 0.7s kubik-bezier(0.16,1,0.3,1), transformasi 0.7s kubik-bezier(0.16,1,0.3,1);
}

.ungkap.in {
  opasitas: 1;
  transformasi: tidak ada;
}

.reveal[data-d="1"] { transition-delay: 0.08s; }
.reveal[data-d="2"] { transition-delay: 0.16s; }
.reveal[data-d="3"] { transition-delay: 0.24s; }

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

/* ═══════════ NAV ═══════════ */
.nav {
  posisi: tetap;
  atas: 0;
  kiri: 0;
  kanan: 0;
  Indeks z: 100;
  transisi: latar belakang 0,3 detik kemudahan, warna batas 0,3 detik kemudahan, filter latar belakang 0,3 detik;
  batas bawah: 1px solid transparan;
  padding-top: var(--safe-top);
}

.nav.gulir {
  latar belakang: rgba(12,12,21,0.88);
  -webkit-backdrop-filter: blur(14px);
  filter latar belakang: buram(14px);
  border-bottom-color: var(--line2);
}

.nav-inner {
  lebar maksimum: 1240px;
  margin: 0 otomatis;
  padding: 14px clamp(16px, 4vw, 48px);
  tampilan: fleksibel;
  sejajarkan item: tengah;
  gap: clamp(16px, 3vw, 40px);
}

.merek {
  tampilan: fleksibel;
  sejajarkan item: tengah;
  jarak: 10px;
  fleksibel-menyusut: 0;
}

.merek dagang {
  lebar: penjepit(36px, 4vw, 40px);
  tinggi: penjepit(36px, 4vw, 40px);
  radius batas: 12px;
  fleksibel-menyusut: 0;
  latar belakang: gradien linier(140 derajat, var(--oranye), var(--orange-deep));
  tampilan: grid;
  tempat-barang: tengah;
  warna: #fff;
  bayangan kotak: 0 6px 18px rgba(255,107,0,0.32);
}

.nama-merek {
  font-family: 'Fraunces', serif;
  ketebalan font: 600;
  ukuran font: penjepit (18px, 2vw, 21px);
  spasi antar huruf: -0,02em;
  spasi putih: tidak ada pembungkus;
}

.nama merek em {
  warna: var(--oranye);
  gaya font: normal;
}

.nav-links {
  tampilan: fleksibel;
  gap: clamp(18px, 2.5vw, 30px);
  margin-kiri: 8px;
  fleksibel: 1;
}

.nav-links a {
  Ukuran font: 14,5px;
  ketebalan font: 500;
  warna: var(--muted);
  transisi: warna 0,2 detik;
  spasi putih: tidak ada pembungkus;
}

.nav-links a:hover, .nav-links a:focus { color: var(--text); }

.nav-cta {
  margin-kiri: otomatis;
  tampilan: fleksibel;
  sejajarkan item: tengah;
  gap: clamp(10px, 1.8vw, 22px);
  fleksibel-menyusut: 0;
}

.nav-call {
  tampilan: fleksibel;
  sejajarkan item: tengah;
  jarak: 10px;
  warna: var(--muted);
  ukuran font: 13px;
}

.nav-call b {
  tampilkan: blok;
  warna: var(--teks);
  ukuran font: 14px;
  ketebalan font: 700;
  spasi antar huruf: 0,01em;
  spasi putih: tidak ada pembungkus;
}

.btn {
  tampilan: inline-flex;
  sejajarkan item: tengah;
  jarak: 9px;
  ketebalan font: 700;
  Ukuran font: 14,5px;
  padding: 12px 22px;
  radius batas: 999px;
  transisi: transformasi 0,25s kubik-bezier(0,16,1,0,3,1), bayangan kotak 0,25s, latar belakang 0,25s, warna 0,25s;
  kursor: penunjuk;
  batas: tidak ada;
  spasi putih: tidak ada pembungkus;
  min-height: 44px;
  font-family: inherit;
  pilihan pengguna: tidak ada;
  -webkit-user-select: none;
}

.tombol-padat {
  latar belakang: var(--orange);
  warna: #fff;
  bayangan kotak: 0 8px 22px rgba(255,107,0,0.32);
}

.btn-solid:hover, .btn-solid:focus {
  transformasi: translasiY(-2px);
  bayangan kotak: 0 12px 30px rgba(255,107,0,0.45);
  latar belakang: var(--oranye-cahaya);
}

.btn-outline {
  latar belakang: transparan;
  warna: var(--teks);
  batas: 1px solid var(--line);
}

.btn-outline:hover, .btn-outline:focus {
  warna-batas: var(--oranye);
  warna: var(--oranye);
}

.burger {
  tampilan: tidak ada;
  latar belakang: tidak ada;
  batas: tidak ada;
  warna: var(--teks);
  kursor: penunjuk;
  padding: 8px;
  min-width: 44px;
  min-height: 44px;
  sejajarkan item: tengah;
  justify-content: center;
}

/* Laci menu seluler */
.laci-seluler {
  tampilan: tidak ada;
  posisi: tetap;
  atas: 0;
  kanan: -100%;
  lebar: min(320px, 85vw);
  tinggi: 100dvh;
  tinggi: 100vh;
  latar belakang: var(--ink2);
  border-left: 1px solid var(--line);
  Indeks z: 200;
  transisi: kanan 0.3s kubik-bezier(0.4, 0, 0.2, 1);
  padding: calc(var(--safe-top) + 24px) 24px 24px;
  arah-fleksibel: kolom;
  jarak: 8px;
  overflow-y: otomatis;
}

.mobile-drawer.open { right: 0; }

.laci-seluler a {
  padding: 14px 16px;
  radius batas: 12px;
  ukuran font: 16px;
  ketebalan font: 600;
  warna: var(--teks);
  transisi: latar belakang 0,2 detik;
  min-height: 44px;
  tampilan: fleksibel;
  sejajarkan item: tengah;
}

.mobile-drawer a:hover { background: rgba(255,255,255,0.05); }

.laci-mobile .laci-tutup {
  posisi: absolut;
  atas: kalkulasi(var(--safe-top) + 16px);
  kanan: 16px;
  latar belakang: rgba(255,255,255,0.06);
  batas: tidak ada;
  lebar: 40px;
  tinggi: 40px;
  radius batas: 10px;
  warna: var(--teks);
  kursor: penunjuk;
  ukuran font: 18px;
}

.overlay laci {
  tampilan: tidak ada;
  posisi: tetap;
  sisipan: 0;
  latar belakang: rgba(0,0,0,0.6);
  Indeks z: 150;
  opasitas: 0;
  transisi: opasitas 0,3 detik;
}

.drawer-overlay.show {
  tampilkan: blok;
  opasitas: 1;
}
</style>
<style>

.marquee-item {
  ...

(fungsi() {

  konstanta autoSpeed ​​= -0.6;
  biarkan isDragging = false;

    const firstCard = allCards[0];
    cardW = firstCard.offsetWidth;
    // Atur lebar = kartu asli (bukan yang clone)
    setWidth = originalCards.length * (cardW + gapW);
    // Mulai dari tengah biar bisa geser bebas ke 2 arah
    currentX = -setWidth;
  }

  // ═══════════ 3D MELENGKUNG — menghitung secara real-time per frame ═══════════
  fungsi applyCurve() {
    const stageRect = stage.getBoundingClientRect();
    const stageCenter = stageRect.left + stageRect.width / 2;
    const halfWidth = stageRect.width / 2;

    untuk (misalkan i = 0; i < allCards.length; i++) {
      const card = allCards[i];
      const cardRect = card.getBoundingClientRect();
      const cardCenter = cardRect.left + cardRect.width / 2;
      // Jarak dari tengah panggung (-1 = kiri jauh, 0 = tengah, 1 = kanan jauh)
      misalkan d = (cardCenter - stageCenter) / halfWidth;
      d = Math.max(-1.3, Math.min(1.3, d));

      // Melengkung: pinggir BESAR & putar tajam, tengah KECIL
      konstanta absD = Math.abs(d);
      const rotY = -d * 42; // rotasi kuat (efek kipas)
      const terjemahanZ = -absD * 40 + absD * 120; // pinggir maju
      skala const = 0,72 + absD * 0,42; // tengah kecil (0.72), pinggir besar (1.14)

      kartu.gaya.transform =
        `translateZ(${translateZ - 60}px) rotateY(${rotY}deg) scale(${scale})`;
      card.style.zIndex = String(100 - Math.round(absD * 80));
    }
  }

  // ═══════════ RENDER LOOP ═══════════
  fungsi frame() {
    Jika (setWidth <= 0) { rafId = requestAnimationFrame(frame); return; }

    jika (sedang menyeret) {
      // Posisi dikontrol dengan cara menyeret
    } kalau tidak {
      // Peluruhan momentum setelah hambatan, lalu gabungkan ke autoSpeed
      jika (Math.abs(kecepatan - autoSpeed) > 0,02) {
        kecepatan += (kecepatan otomatis - kecepatan) * 0,05; // perpaduan halus
      } kalau tidak {
        kecepatan = autoSpeed;
      }
      // Jeda saat kursor diarahkan ke layar
      jika (sedang melayang) {
        currentX += 0; // bekukan
      } kalau tidak {
        arusX += kecepatan;
      }
    }

    // Pembungkus tak terbatas (tanpa sambungan)
    selama (currentX <= -setWidth * 2) currentX += setWidth;
    selama (currentX >= 0) currentX -= setWidth;

    track.style.transform = `translate3d(${currentX}px, 0, 0)`;
    terapkanKurva();

    rafId = requestAnimationFrame(frame);
  }

  // ═══════════ HOVER (hanya desktop, tidak memengaruhi sentuhan) ═══════════
  stage.addEventListener('mouseenter', () => { isHovering = true; });
  stage.addEventListener('mouseleave', () => { isHovering = false; });

  // ═══════════ DRAG ═══════════
  stage.addEventListener('pointerdown', (e) => {
    isDragging = true;
    isHovering = false; // reset hover
    stage.classList.add('dragging');

    lastPointerX = e.clientX;
    lastPointerT = performance.now();

    const dx = e.clientX - dragStartX;

    // Lacak kecepatan untuk momentum

  stage.addEventListener('touchstart', () => { isHovering = false; }, { passive: true });

  const images = track.querySelectorAll('img');

  fungsi startWhenReady() {

  }

  jika (totalImages === 0) {

    gambar.forEach(img => {
      jika (img.complete) {
        loadedCount++;
        jika (loadedCount === totalImages) startWhenReady();
      } kalau tidak {
        img.addEventListener('load', () => {

          jika (loadedCount === totalImages) startWhenReady();
        }, { once: true });
        img.addEventListener('error', () => {
          loadedCount++;
          jika (loadedCount === totalImages) startWhenReady();
        }, { once: true });
      }
    });
    // Fallback jika gambar lama dimuat
    setTimeout(() => {
      jika (!rafId) mulaiSaatSiap();
    }, 2000);
  }
})();

pada saat menggulir();

// Tampilkan saat digulir
const io = new IntersectionObserver((entries) => {
  entri.forEach(e => {
    jika (e.berpotongan) {
      e.target.classList.add('in');
      io.unobserve(e.target);
    }
  });
}, { ambang batas: 0,12, rootMargin: '0px 0px -8% 0px' });

document.querySelectorAll('.reveal').forEach(el => io.observe(el));

// Animasi penghitung
const easeOut = t => 1 - Math.pow(1 - t, 3);

fungsi runCounter(el) {
  const target = parseFloat(el.dataset.count);
  const suffix = el.dataset.suffix || '';
  const valSpan = el.querySelector('.val');
  konstanta durasi = 1400;
  const start = performance.now();

  fungsi tick(sekarang) {
    const p = Math.min((now - start) / dur, 1);
    const v = Math.round(easeOut(p) * target);
    jika (valSpan) valSpan.textContent = v;
    jika tidak, el.textContent = v + (p === 1 ? suffix : '');
    jika (p < 1) mintaAnimationFrame(tick);
    jika (!valSpan) el.textContent = target + suffix;
  }
  requestAnimationFrame(tick);
}

const cio = new IntersectionObserver((entries) => {
  entri.forEach(e => {
    jika (e.berpotongan) {
      runCounter(e.target);
      cio.unobserve(e.target);
    }
  });
}, { ambang batas: 0,6 });

document.querySelectorAll('[data-count]').forEach(el => cio.observe(el));
