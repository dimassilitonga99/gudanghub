<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d1a">
  <title>GudangHub — Notifikasi</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./public/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="./src/styles/main.css">

  <style>
    body {
      background: var(--ink);
      min-height: 100dvh;
    }

    .topbar {
      background: var(--ink-2);
      border-bottom: 1px solid var(--line-soft);
      padding: 12px 20px;
      padding-top: calc(12px + var(--safe-top));
      padding-right: calc(20px + var(--safe-right));
      padding-left: calc(20px + var(--safe-left));
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: var(--z-sticky);
    }

    .topbar-back {
      display: grid;
      min-width: 40px;
      min-height: 40px;
      place-items: center;
      padding: 8px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      text-decoration: none;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .topbar-back:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .topbar-title {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 700;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-title em {
      color: var(--orange);
      font-style: normal;
    }

    .unread-count {
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px;
      min-width: 22px;
      text-align: center;
    }

    .unread-count:empty { display: none; }

    .btn-action {
      background: var(--ink-3);
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      padding: 8px 14px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
      min-height: 40px;
      flex-shrink: 0;
    }

    .btn-action:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .content {
      padding: 20px;
      padding-left: calc(20px + var(--safe-left));
      padding-right: calc(20px + var(--safe-right));
      padding-bottom: calc(20px + var(--safe-bottom));
      max-width: 900px;
      margin: 0 auto;
    }

    /* Filter tabs */
    .notif-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }

    .notif-tabs::-webkit-scrollbar { display: none; }

    .notif-tab {
      flex-shrink: 0;
      padding: 8px 16px;
      border: 1px solid var(--line-soft);
      border-radius: 20px;
      background: var(--card);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      min-height: 36px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .notif-tab:hover {
      color: var(--text);
    }

    .notif-tab.active {
      background: var(--orange-dim);
      border-color: var(--orange);
      color: var(--orange);
    }

    .notif-tab-count {
      background: var(--ink-3);
      color: var(--muted);
      font-size: 10px;
      padding: 1px 8px;
      border-radius: 10px;
      font-weight: 700;
    }

    .notif-tab.active .notif-tab-count {
      background: var(--orange);
      color: #fff;
    }

    /* Notification list */
    .notif-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .notif-item {
      background: var(--card);
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      gap: 14px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
    }

    .notif-item:hover {
      transform: translateY(-1px);
      border-color: var(--line-orange);
    }

    .notif-item.unread {
      background: linear-gradient(90deg, rgba(255, 107, 0, 0.06), var(--card) 30%);
      border-color: rgba(255, 107, 0, 0.25);
    }

    .notif-item.unread::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 3px;
      background: var(--orange);
    }

    .notif-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .notif-icon.orange { background: var(--orange-dim); }
    .notif-icon.green { background: rgba(34, 197, 94, 0.15); }
    .notif-icon.red { background: rgba(239, 68, 68, 0.15); }
    .notif-icon.blue { background: rgba(59, 130, 246, 0.15); }
    .notif-icon.yellow { background: rgba(245, 158, 11, 0.15); }

    .notif-content {
      flex: 1;
      min-width: 0;
    }

    .notif-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .notif-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      overflow-wrap: break-word;
    }

    .notif-badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .notif-badge.new {
      background: var(--orange);
      color: #fff;
    }

    .notif-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 6px;
      overflow-wrap: break-word;
    }

    .notif-desc strong {
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .notif-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .notif-time {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .notif-time-full {
      font-size: 10px;
      color: var(--text-dim);
    }

    .notif-action {
      font-size: 11px;
      color: var(--orange);
      font-weight: 700;
    }

    /* Empty state */
    .empty-state {
      background: var(--card);
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state .empty-icon {
      font-size: 56px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state h3 {
      font-family: var(--font-serif);
      font-size: 18px;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* Loading */
    .loading-state {
      background: var(--card);
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }

    /* Auto refresh indicator */
    .auto-refresh {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--card);
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .auto-refresh-dot {
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }

    @media (max-width: 600px) {
      .content { padding: 12px; }
      .notif-item { padding: 14px; gap: 10px; }
      .notif-icon { width: 40px; height: 40px; font-size: 18px; }
    }
  </style>
</head>

<body>

  <header class="topbar">
    <a class="topbar-back" id="btnBack" href="./dashboard.html" title="Kembali">←</a>

    <div class="topbar-title">
      <span>🔔</span>
      <span>Notifikasi</span>
      <span class="unread-count" id="unreadCount"></span>
    </div>

    <button class="btn-action" id="btnMarkAllRead" type="button" title="Tandai semua sudah dibaca">
      <span>✓</span>
      <span>Baca Semua</span>
    </button>
  </header>

  <main class="content">

    <div class="auto-refresh">
      <div class="auto-refresh-dot"></div>
      <span>Refresh otomatis setiap 30 detik</span>
      <span id="lastRefresh" style="color: var(--text-dim);"></span>
    </div>

    <!-- Filter tabs -->
    <div class="notif-tabs">
      <button class="notif-tab active" type="button" data-filter="all">
        Semua
        <span class="notif-tab-count" id="countAll">0</span>
      </button>
      <button class="notif-tab" type="button" data-filter="unread">
        Belum Dibaca
        <span class="notif-tab-count" id="countUnread">0</span>
      </button>
      <button class="notif-tab" type="button" data-filter="pending">
        ⏳ Pending
        <span class="notif-tab-count" id="countPending">0</span>
      </button>
      <button class="notif-tab" type="button" data-filter="approved">
        ✅ Approved
        <span class="notif-tab-count" id="countApproved">0</span>
      </button>
      <button class="notif-tab" type="button" data-filter="rejected">
        ❌ Rejected
        <span class="notif-tab-count" id="countRejected">0</span>
      </button>
    </div>

    <!-- Notification list -->
    <div id="notifList">
      <div class="loading-state">
        <div class="spinner spinner-lg" style="color: var(--orange); margin: 0 auto 12px;"></div>
        <p>Memuat notifikasi...</p>
      </div>
    </div>

  </main>

  <script type="module" src="./src/js/pages/notifikasi.js"></script>
  <script type="module">
  import { initPwa } from './src/js/pwa.js';
  initPwa();
</script>
</body>
</html>
