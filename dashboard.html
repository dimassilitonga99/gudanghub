<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
<meta name="theme-color" content="#0d0d1a">
<title>GudangHub — Dashboard Admin v2.6</title>
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --orange: #ff6b00;
  --orange-light: #ff8c38;
  --orange-dim: rgba(255,107,0,0.12);
  --dark: #0d0d1a;
  --dark2: #12122a;
  --dark3: #1a1a35;
  --card: #1e1e3a;
  --card2: #22223f;
  --border: rgba(255,107,0,0.15);
  --border2: rgba(255,255,255,0.06);
  --text: #e2e8f0;
  --muted: #94a3b8;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --blue: #3b82f6;
  --sidebar-w: 260px;
  --safe-top: env(safe-area-inset-top, 0);
  --safe-bottom: env(safe-area-inset-bottom, 0);
  --safe-left: env(safe-area-inset-left, 0);
  --safe-right: env(safe-area-inset-right, 0);
}

html {
  background: var(--dark);
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  overflow-x: hidden;
}

body {
  background: transparent;
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  display: flex;
  min-height: 100dvh;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.5;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background-color: var(--dark);
  background-image:
    linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
  background-size: 46px 46px;
  will-change: transform;
}

img, svg { max-width: 100%; height: auto; }

/* ═══════════ SIDEBAR ═══════════ */
.sidebar {
  width: var(--sidebar-w);
  background: var(--dark2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  padding-left: var(--safe-left);
}

.sidebar-logo {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-logo-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--orange), var(--orange-light));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(255,107,0,0.3);
}

.sidebar-logo-title {
  font-size: 16px;
  font-weight: 800;
  color: #fff;
}

.sidebar-logo-sub {
  font-size: 10px;
  color: var(--muted);
}

.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}

.nav-section { margin-bottom: 20px; }

.nav-section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  padding: 0 10px;
  margin-bottom: 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: 10px;
  cursor: pointer;
  transition: background-color 0.15s, color 0.15s;
  color: var(--muted);
  font-size: 14px;
  font-weight: 500;
  border: 1px solid transparent;
  margin-bottom: 2px;
  user-select: none;
  min-height: 44px;
}

.nav-item:hover, .nav-item:focus {
  background: rgba(255,255,255,0.05);
  color: var(--text);
}

.nav-item.active {
  background: var(--orange-dim);
  border-color: var(--border);
  color: var(--orange);
}

.nav-item .nav-icon { font-size: 17px; flex-shrink: 0; }

.nav-badge {
  margin-left: auto;
  background: var(--orange);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  min-width: 20px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

.sidebar-user {
  padding: 16px;
  border-top: 1px solid var(--border2);
}

.user-card {
  background: var(--dark3);
  border-radius: 12px;
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-avatar {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--orange), var(--orange-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.user-info { flex: 1; min-width: 0; }

.user-name {
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.user-role {
  font-size: 11px;
  color: var(--orange);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.btn-logout {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 18px;
  padding: 8px;
  min-width: 36px;
  min-height: 36px;
  border-radius: 8px;
  transition: color 0.15s, background 0.15s;
  display: grid;
  place-items: center;
  font-family: inherit;
}

.btn-logout:hover { color: var(--red); background: rgba(239,68,68,0.1); }

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
  opacity: 0;
  transition: opacity 0.3s;
  -webkit-backdrop-filter: blur(2px);
  backdrop-filter: blur(2px);
}

.sidebar-overlay.show {
  display: block;
  opacity: 1;
}

/* ═══════════ MAIN ═══════════ */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  min-height: 100vh;
  min-width: 0;
}

.topbar {
  background: var(--dark2);
  border-bottom: 1px solid var(--border2);
  padding: 12px 20px;
  padding-top: calc(12px + var(--safe-top));
  padding-right: calc(20px + var(--safe-right));
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
}

.topbar-menu {
  display: none;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  padding: 6px;
  min-width: 40px;
  min-height: 40px;
  border-radius: 8px;
  align-items: center;
  justify-content: center;
  font-family: inherit;
  flex-shrink: 0;
}

.topbar-title {
  font-size: 16px;
  font-weight: 700;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.topbar-time {
  font-size: 11px;
  color: var(--muted);
  background: var(--dark3);
  padding: 6px 12px;
  border-radius: 20px;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  white-space: nowrap;
}

.btn-refresh {
  background: var(--orange-dim);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  color: var(--orange);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: inherit;
  min-height: 40px;
  flex-shrink: 0;
}

.btn-refresh:hover { background: rgba(255,107,0,0.2); }

.btn-refresh.spinning .refresh-icon {
  animation: spin 0.6s linear infinite;
  display: inline-block;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.content {
  flex: 1;
  padding: 20px;
  padding-left: calc(20px + var(--safe-left));
  padding-right: calc(20px + var(--safe-right));
  padding-bottom: calc(20px + var(--safe-bottom));
}

.page {
  display: none;
  animation: fadeIn 0.2s ease;
}

.page.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
<style>
/* ═══════════ STATS ═══════════ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 18px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  min-width: 0;
}

.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.3);
}

.stat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 8px;
}

.stat-label {
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.stat-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}

.stat-value {
  font-size: clamp(24px, 4vw, 32px);
  font-weight: 800;
  line-height: 1;
  margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}

.stat-change {
  font-size: 11px;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.grid-3-1 {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 14px;
  margin-bottom: 20px;
}

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 20px;
}

/* ═══════════ PANEL ═══════════ */
.panel {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 16px;
  overflow: hidden;
  min-width: 0;
}

.panel-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-wrap: wrap;
}

.panel-title {
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.panel-body {
  padding: 18px;
}

.panel-action {
  background: var(--orange-dim);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  color: var(--orange);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 0.15s;
  font-family: inherit;
  min-height: 32px;
  white-space: nowrap;
}

.panel-action:hover { background: rgba(255,107,0,0.2); }

/* ═══════════ TABLE ═══════════ */
.order-table-wrap {
  overflow-x: auto;
  overscroll-behavior-x: contain;
  -webkit-overflow-scrolling: touch;
}

.order-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 500px;
}

.order-table th {
  padding: 10px 14px;
  text-align: left;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border2);
  white-space: nowrap;
  background: var(--card);
  position: sticky;
  top: 0;
  z-index: 1;
}

.order-table td {
  padding: 12px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  vertical-align: middle;
}

.order-table tr:last-child td { border-bottom: none; }

.order-table tbody tr {
  transition: background-color 0.1s ease;
}

.order-table tbody tr:hover td {
  background: rgba(255,255,255,0.02);
}

.order-id {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--orange);
  font-weight: 700;
  word-break: break-all;
}

.cabang-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--dark3);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  white-space: nowrap;
}

.status-badge.pending {
  background: rgba(245,158,11,0.15);
  color: var(--yellow);
  border: 1px solid rgba(245,158,11,0.3);
}

.status-badge.approved {
  background: rgba(34,197,94,0.15);
  color: var(--green);
  border: 1px solid rgba(34,197,94,0.3);
}

.status-badge.rejected {
  background: rgba(239,68,68,0.15);
  color: var(--red);
  border: 1px solid rgba(239,68,68,0.3);
}

.action-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.btn-approve, .btn-reject, .btn-detail {
  border-radius: 7px;
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: background-color 0.15s;
  font-family: inherit;
  min-height: 30px;
  white-space: nowrap;
}

.btn-approve {
  background: rgba(34,197,94,0.15);
  border: 1px solid rgba(34,197,94,0.3);
  color: var(--green);
}

.btn-approve:hover { background: rgba(34,197,94,0.25); }

.btn-reject {
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  color: var(--red);
}

.btn-reject:hover { background: rgba(239,68,68,0.25); }

.btn-detail {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border2);
  color: var(--muted);
  padding: 5px 10px;
}

.btn-detail:hover { color: var(--text); background: rgba(255,255,255,0.1); }

/* ═══════════ CABANG ═══════════ */
.cabang-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.cabang-card {
  background: var(--dark3);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px;
  transition: border-color 0.2s;
}

.cabang-card:hover { border-color: rgba(255,107,0,0.3); }

.cabang-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.cabang-avatar {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  background: linear-gradient(135deg, var(--orange), var(--orange-light));
  flex-shrink: 0;
}

.cabang-name {
  font-size: 12px;
  font-weight: 700;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cabang-id { font-size: 10px; color: var(--orange); }

.cabang-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
}

.cabang-stat {
  background: var(--card);
  border-radius: 8px;
  padding: 8px;
  text-align: center;
}

.cabang-stat-val {
  font-size: 18px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}

.cabang-stat-lbl {
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
}

/* ═══════════ DONUT & BAR ═══════════ */
.donut-wrap {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 8px 0;
  flex-wrap: wrap;
}

.donut-wrap svg {
  flex-shrink: 0;
}

.donut-legend {
  flex: 1;
  min-width: 130px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-label {
  font-size: 12px;
  color: var(--muted);
}

.legend-val {
  margin-left: auto;
  font-size: 13px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  height: 120px;
  padding-top: 10px;
}

.bar-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  height: 100%;
  justify-content: flex-end;
  min-width: 0;
}

.bar-fill {
  width: 100%;
  background: linear-gradient(to top, var(--orange), var(--orange-light));
  border-radius: 6px 6px 0 0;
  transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  min-height: 4px;
  will-change: height;
}

.bar-label {
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  width: 100%;
}

/* ═══════════ ACTIVITY ═══════════ */
.activity-item {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border2);
}

.activity-item:last-child { border-bottom: none; }

.activity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

.activity-dot.orange { background: var(--orange); }
.activity-dot.green { background: var(--green); }
.activity-dot.red { background: var(--red); }
.activity-dot.blue { background: var(--blue); }

.activity-content {
  flex: 1;
  min-width: 0;
}

.activity-text {
  font-size: 12px;
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
}

.activity-text strong { color: var(--orange); }

.activity-time {
  font-size: 10px;
  color: var(--muted);
  margin-top: 3px;
}

/* ═══════════ MODAL ═══════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  padding-top: max(16px, var(--safe-top));
  padding-bottom: max(16px, var(--safe-bottom));
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
}

.modal-overlay.show {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  width: 100%;
  max-width: 720px;
  max-height: calc(100dvh - 32px);
  max-height: calc(100vh - 32px);
  overflow-y: auto;
  overscroll-behavior: contain;
  transform: translateY(20px) scale(0.98);
  transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);
  will-change: transform;
  -webkit-overflow-scrolling: touch;
}

.modal-overlay.show .modal {
  transform: translateY(0) scale(1);
}

.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--card);
  z-index: 1;
  border-radius: 18px 18px 0 0;
  gap: 10px;
}

.modal-title {
  font-size: 15px;
  font-weight: 700;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

.modal-close {
  background: rgba(255,255,255,0.08);
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  transition: background-color 0.15s, color 0.15s;
  font-family: inherit;
  flex-shrink: 0;
  display: grid;
  place-items: center;
}

.modal-close:hover { background: var(--red); color: #fff; }

.modal-body { padding: 20px; }

.info-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border2);
  font-size: 12px;
  gap: 12px;
  flex-wrap: wrap;
}

.info-row:last-child { border-bottom: none; }
.info-label { color: var(--muted); flex-shrink: 0; }
.info-value {

function debounce(fn, wait) {
  let t;
  return function(...args) {
    clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), wait);
  };
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatRp(v) { return 'Rp ' + (parseFloat(v) || 0).toLocaleString('id-ID'); }

function formatTanggalDisplay(str) {
  if (!str || !str.trim()) return '-';
  str = String(str).trim();
  if (/^\d{2}-\d{2}-\d{4}/.test(str)) return str.split('.')[0];
  try {
    const d = new Date(str);
    if (isNaN(d.getTime())) return str;
    const w = new Date(d.getTime() + 8 * 3600000);
    const p = n => String(n).padStart(2, '0');
    return `${p(w.getUTCDate())}-${p(w.getUTCMonth()+1)}-${w.getUTCFullYear()} ${p(w.getUTCHours())}:${p(w.getUTCMinutes())}:${p(w.getUTCSeconds())}`;
  } catch (e) { return str; }
}

function parseAnyDate(str) {
  if (!str || !str.trim()) return new Date(0);
  str = String(str).trim();
  if (/^\d{2}-\d{2}-\d{4}/.test(str)) {
    const p = str.split(' '), dp = p[0].split('-'), tp = p[1] || '00:00:00';
    return new Date(`${dp[2]}-${dp[1]}-${dp[0]}T${tp}+08:00`);
  }
  try { const d = new Date(str); return isNaN(d.getTime()) ? new Date(0) : d; }
  catch (e) { return new Date(0); }
}

function showToast(msg, type = 'info', dur = 3000) {
  const ic = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
  const c = $('toastContainer');
  if (!c) return;
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${ic[type] || 'ℹ️'}</span><span style="flex:1">${esc(msg)}</span><button class="toast-close">✕</button>`;
  t.querySelector('.toast-close').onclick = () => t.remove();
  c.appendChild(t);
  rafBatch(() => rafBatch(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, dur);
}

// ═══════════════════════════════════════════════════════════════
// API CALL
// ═══════════════════════════════════════════════════════════════
async function callAPI(action, payload = {}) {
  const body = JSON.stringify({ ...payload, action });
  try {
    const f = new FormData();
    f.append('payload', body);
    const r = await fetch(API_URL, { method: 'POST', body: f, cache: 'no-store' });
    const txt = await r.text();
    const p = parseResp(txt);
    if (p.status === 'ok' || (p.status === 'error' && p.message !== 'Respons kosong.')) return p;
  } catch (e) {}
  try {
    const enc = encodeURIComponent(body);
    const r = await fetch(`${API_URL}?action=${action}&payload=${enc}`, { cache: 'no-store' });
    return parseResp(await r.text());
  } catch (e) {}
  return { status: 'error', message: 'Gagal terhubung ke server.' };
}

function parseResp(text) {
  if (!text || !text.trim()) return { status: 'error', message: 'Respons kosong.' };
  try { return JSON.parse(text); } catch (e) {}
  try {
    const m = text.match(/\{[\s\S]*\}/);
    if (m) return JSON.parse(m[0]);
  } catch (e) {}
  return { status: 'error', message: 'Respons tidak valid.' };
}

// ═══════════════════════════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════════════════════════
async function loadAllData(force = false) {
  if (isLoading) return;
  if (!force && Date.now() - lastLoadTime < 3000) return;

  isLoading = true;
  $('btnRefresh')?.classList.add('spinning');

  try {
    const [oRes, kRes] = await Promise.all([
      fetch(`${API_URL}?action=getOrders&t=${Date.now()}`, { cache: 'no-store' }).then(r => r.text()).then(parseResp),
      fetch(`${API_URL}?action=getBarang&t=${Date.now()}`, { cache: 'no-store' }).then(r => r.text()).then(parseResp)
    ]);
    if (oRes.status === 'ok') allOrders = oRes.data || [];
    if (kRes.status === 'ok') allKatalog = kRes.data || [];
    lastLoadTime = Date.now();

    rafBatch(() => {
      updatePendingBadge();
      if (currentPage === 'dashboard') {
        updateStats(); updateDonut(); updateBarChart(); renderPendingOrders(); updateActivity();
      } else if (currentPage === 'orders') { filteredOrders = [...allOrders]; renderAllOrders(); }
      else if (currentPage === 'katalog') renderKatalog();
      else if (currentPage === 'cabang') renderCabang();
      else if (currentPage === 'laporan') renderLaporan();
    });
  } catch (err) {
    showToast('Gagal memuat: ' + err.message, 'error');
  } finally {
    isLoading = false;
    $('btnRefresh')?.classList.remove('spinning');
  }
}

function updateStats() {
  const t = allOrders.length;
  const p = allOrders.filter(o => String(o.STATUS).toUpperCase() === 'PENDING').length;
  const a = allOrders.filter(o => String(o.STATUS).toUpperCase() === 'APPROVED').length;
  const r = allOrders.filter(o => String(o.STATUS).toUpperCase() === 'REJECTED').length;
  if ($('statTotal')) $('statTotal').textContent = t;
  if ($('statPending')) $('statPending').textContent = p;
  if ($('statApproved')) $('statApproved').textContent = a;
  if ($('statRejected')) $('statRejected').textContent = r;
}

function updatePendingBadge() {
  const n = allOrders.filter(o => String(o.STATUS).toUpperCase() === 'PENDING').length;
  const el = $('pendingBadge');
  if (el) el.textContent = n;
}

function updateDonut() {
  const t = allOrders.length || 1;
  const a = allOrders.filter(o => String(o.STATUS).toUpperCase() === 'APPROVED').length;
  const p = allOrders.filter(o => String(o.STATUS).toUpperCase() === 'PENDING').length;
  const r = allOrders.filter(o => String(o.STATUS).toUpperCase() === 'REJECTED').length;
  const c = 2 * Math.PI * 40;
  const aL = a/t*c, pL = p/t*c, rL = r/t*c;
  const dA = $('donutApproved'), dP = $('donutPending'), dR = $('donutRejected');
  if (dA) dA.setAttribute('stroke-dasharray', `${aL} ${c-aL}`);
  if (dP) { dP.setAttribute('stroke-dasharray', `${pL} ${c-pL}`); dP.setAttribute('stroke-dashoffset', `-${aL}`); }
  if (dR) { dR.setAttribute('stroke-dasharray', `${rL} ${c-rL}`); dR.setAttribute('stroke-dashoffset', `-${aL+pL}`); }
  if ($('donutTotal')) $('donutTotal').textContent = allOrders.length;
  if ($('legendApproved')) $('legendApproved').textContent = a;
  if ($('legendPending')) $('legendPending').textContent = p;
  if ($('legendRejected')) $('legendRejected').textContent = r;
}

function updateBarChart() {
  const el = $('barChart');
  if (!el) return;
  const c = {};
  for (const o of allOrders) if (o.ID_CABANG) c[o.ID_CABANG] = (c[o.ID_CABANG] || 0) + 1;
  const mx = Math.max(...Object.values(c), 1);
  const nm = ['Eltari', 'Oesapa', 'TDM', 'Kefa'];
  el.innerHTML = ['CB001','CB002','CB003','CB004'].map((id, i) =>
    `<div class="bar-item"><div class="bar-fill" style="height:${Math.max(c[id]||0,0)/mx*90+4}%"></div><div class="bar-label">${nm[i]}</div></div>`
  ).join('');
}

function updateActivity() {
  const f = $('activityFeed');
  if (!f) return;
  if (!allOrders.length) {
    f.innerHTML = '<div class="empty-state"><div class="empty-icon">⚡</div><p>Belum ada aktivitas</p></div>';
    return;
  }
  const s = [...allOrders].sort((a,b) => parseAnyDate(String(b.TANGGAL_ORDER)) - parseAnyDate(String(a.TANGGAL_ORDER))).slice(0, 6);
  const cst = { PENDING: 'orange', APPROVED: 'green', REJECTED: 'red' };
  const em = { PENDING: '⏳', APPROVED: '✅', REJECTED: '❌' };
  f.innerHTML = s.map(o => {
    const cb = CABANG_INFO[o.ID_CABANG] || { pic: '-', icon: '🏪' };
    const st = String(o.STATUS || 'PENDING').toUpperCase();
    return `<div class="activity-item"><div class="activity-dot ${cst[st]||'blue'}"></div><div class="activity-content"><div class="activity-text">${em[st]||'📦'} <strong>${esc(o.ORDER_ID)}</strong> dari ${esc(cb.pic)} | ${esc(o.ID_CABANG)}</div><div class="activity-time">🕐 ${formatTanggalDisplay(String(o.TANGGAL_ORDER||''))}</div></div></div>`;
  }).join('');
}

function renderPendingOrders() {
  const tb = $('pendingOrdersBody');
  if (!tb) return;
  const pend = allOrders.filter(o => String(o.STATUS).toUpperCase() === 'PENDING');
  if (!pend.length) {
    tb.innerHTML = '<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">✅</div><p>Semua order sudah diproses!</p></div></td></tr>';
    return;
  }
  tb.innerHTML = pend.map(o => {
    const cb = CABANG_INFO[o.ID_CABANG] || { pic: '-', icon: '🏪' };
    const it = o.DETAIL?.length || '?';
    return `<tr><td><span class="order-id">${esc(o.ORDER_ID)}</span></td><td><span class="cabang-badge">${cb.icon} ${esc(cb.pic)}</span></td><td style="text-align:center;font-size:12px;">${it}</td><td><div class="action-btns"><button class="btn-approve" data-quick-approve="${esc(o.ORDER_ID)}">✅</button><button class="btn-reject" data-quick-reject="${esc(o.ORDER_ID)}">❌</button><button class="btn-detail" data-show-detail="${esc(o.ORDER_ID)}">✏️ Kelola</button></div></td></tr>`;
  }).join('');
  bindOrderActions(tb);
}

function renderAllOrders() {
  const tb = $('allOrdersBody');
  if (!tb) return;
  if (!filteredOrders.length) {
    tb.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📭</div><p>Tidak ada order</p></div></td></tr>';
    return;
  }
  const cls = { PENDING:'pending', APPROVED:'approved', REJECTED:'rejected' };
  const em = { PENDING:'⏳', APPROVED:'✅', REJECTED:'❌' };
  tb.innerHTML = filteredOrders.map((o, i) => {
    const cb = CABANG_INFO[o.ID_CABANG] || { pic:'-', icon:'🏪' };
    const st = String(o.STATUS || 'PENDING').toUpperCase();
    return `<tr><td style="color:var(--muted);font-size:12px;">${i+1}</td><td><span class="order-id">${esc(o.ORDER_ID)}</span></td><td><span class="cabang-badge">${cb.icon} ${esc(cb.pic)}</span></td><td style="font-size:11px;">${formatTanggalDisplay(String(o.TANGGAL_ORDER||''))}</td><td><span class="status-badge ${cls[st]||'pending'}">${em[st]||'⏳'} ${st}</span></td><td><div class="action-btns">${st==='PENDING'?`<button class="btn-approve" data-quick-approve="${esc(o.ORDER_ID)}">✅</button><button class="btn-reject" data-quick-reject="${esc(o.ORDER_ID)}">❌</button>`:''}<button class="btn-detail" data-show-detail="${esc(o.ORDER_ID)}">✏️ Kelola</button></div></td></tr>`;

}

function bindOrderActions(container) {
  container.querySelectorAll('[data-quick-approve]').forEach(b => b.onclick = () => quickApprove(b.dataset.quickApprove));
  container.querySelectorAll('[data-quick-reject]').forEach(b => b.onclick = () => quickReject(b.dataset.quickReject));
  container.querySelectorAll('[data-show-detail]').forEach(b => b.onclick = () => showDetail(b.dataset.showDetail));
}

function filterOrders(st, btn) {
  currentFilter = st;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  applyFilters($('orderSearch')?.value || '');
}

function applyFilters(sr) {
  const s = String(sr || '').toLowerCase();
  filteredOrders = allOrders.filter(o => {
    const ms = currentFilter === 'ALL' || String(o.STATUS).toUpperCase() === currentFilter;
    const mq = !s || o.ORDER_ID.toLowerCase().includes(s) || String(o.ID_CABANG||'').toLowerCase().includes(s);
    return ms && mq;
  });
  renderAllOrders();
}

function renderKatalog(f = '') {
  const tb = $('katalogBody');
  if (!tb) return;
  const fs = String(f || '').toLowerCase();
  const d = allKatalog.filter(b => !fs || String(b.KODE_BARANG||'').toLowerCase().includes(fs) || String(b.NAMA_BARANG||'').toLowerCase().includes(fs));

    tb.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📚</div><p>Tidak ada barang</p></div></td></tr>';

}

function renderCabang() {
  const el = $('cabangGrid');
  if (!el) return;
  el.innerHTML = Object.entries(CABANG_INFO).map(([id, info]) => {
    const o = allOrders.filter(x => x.ID_CABANG === id);
    const p = o.filter(x => String(x.STATUS) === 'PENDING').length;
    const a = o.filter(x => String(x.STATUS) === 'APPROVED').length;
    return `<div class="cabang-card"><div class="cabang-card-header"><div class="cabang-avatar">${info.icon}</div><div style="min-width:0;flex:1;"><div class="cabang-name">${esc(info.nama)}</div><div class="cabang-id">${id} · PIC: ${esc(info.pic)}</div></div></div><div class="cabang-stats"><div class="cabang-stat"><div class="cabang-stat-val">${o.length}</div><div class="cabang-stat-lbl">Total</div></div><div class="cabang-stat"><div class="cabang-stat-val" style="color:var(--yellow)">${p}</div><div class="cabang-stat-lbl">Tertunda</div></div><div class="cabang-stat"><div class="cabang-stat-val" style="color:var(--green)">${a}</div><div class="cabang-stat-lbl">Disetujui</div></div></div></div>`;
  }).join('');
}

function renderLaporan() {
  const el = $('laporanBody');
  if (!el) return;
  let gp=0, ga=0, gr=0, gt=0;
  const rows = Object.entries(CABANG_INFO).map(([id, info]) => {
    const o = allOrders.filter(x => x.ID_CABANG === id);
    const p = o.filter(x => String(x.STATUS) === 'PENDING').length;
    const a = o.filter(x => String(x.STATUS) === 'APPROVED').length;
    const r = o.filter(x => String(x.STATUS) === 'REJECTED').length;
    const rate = o.length ? Math.round(a/o.length*100) : 0;
    gt+=o.length; gp+=p; ga+=a; gr+=r;
    return `<tr><td><span class="cabang-badge">${info.icon} ${id}</span></td><td style="font-size:12px;">${esc(info.nama)}</td><td style="font-size:11px;color:var(--muted);">${esc(info.pic)}</td><td style="font-weight:700;">${o.length}</td><td style="color:var(--yellow);font-weight:700;">${p}</td><td style="color:var(--green);font-weight:700;">${a}</td><td style="color:var(--red);font-weight:700;">${r}</td><td><div style="display:flex;align-items:center;gap:8px;min-width:100px;"><div style="flex:1;height:6px;background:var(--dark3);border-radius:3px;overflow:hidden;"><div style="width:${rate}%;height:100%;background:var(--green);"></div></div><span style="font-size:11px;font-weight:700;color:var(--green);">${rate}%</span></div></td></tr>`;
  }).join('');
  const grate = gt ? Math.round(ga/gt*100) : 0;
  el.innerHTML = rows + `<tr class="total-row"><td colspan="3">TOTAL</td><td>${gt}</td><td>${gp}</td><td>${ga}</td><td>${gr}</td><td>${grate}% ✅</td></tr>`;
}

// ═══════════════════════════════════════════════════════════════
// APPROVE / REJECT / EDIT
// ═══════════════════════════════════════════════════════════════
function quickApprove(id) {
  const order = allOrders.find(o => o.ORDER_ID === id);
  const cb = order ? CABANG_INFO[order.ID_CABANG] : { pic:'-' };
  showConfirm({
    icon:'✅', title:'Setujui Pesanan?',
    msg:`${id}\nCabang: ${cb.pic}\n\n✔️ Semua item disetujui\n📧 Email dikirim ke cabang`,
    okText:'✅ Ya, Setujui', okClass:'success',
    onOk: () => updateOrderStatus(id, 'APPROVED', '')
  });
}

function quickReject(id) {
  const order = allOrders.find(o => o.ORDER_ID === id);
  const cb = order ? CABANG_INFO[order.ID_CABANG] : { pic:'-' };
  showPrompt({
    icon:'❌', title:'Tolak Seluruh Pesanan',
    msg:`${id} — Cabang: ${cb.pic}\n\nIsi alasan (WAJIB):`,
    placeholder:'Contoh: Stok habis...', okText:'❌ Ya, Tolak',
    okClass:'danger', required:true,
    onOk: (alasan) => updateOrderStatus(id, 'REJECTED', alasan)
  });
}

async function updateOrderStatus(id, status, alasan) {
  const idx = allOrders.findIndex(o => o.ORDER_ID === id);
  const oldStatus = idx >= 0 ? allOrders[idx].STATUS : null;
  if (idx >= 0) {
    allOrders[idx].STATUS = status;
    allOrders[idx].TANGGAL_PROSES = new Date().toLocaleString('id-ID');
    rafBatch(() => {
      updatePendingBadge();
      if (currentPage === 'dashboard') { updateStats(); renderPendingOrders(); updateDonut(); updateActivity(); }
      else if (currentPage === 'orders') applyFilters($('orderSearch')?.value || '');
    });
  }
  showToast(`⏳ ${status === 'APPROVED' ? 'Menyetujui' : 'Menolak'} ${id}...`, 'info', 2000);
  const data = await callAPI('updateStatus', { orderId: id, status, alasan });
  if (data.status === 'ok') {
    showToast(status === 'APPROVED' ? '✅ Disetujui!' : '❌ Ditolak!', 'success', 3000);
  } else {
    if (idx >= 0 && oldStatus) {
      allOrders[idx].STATUS = oldStatus;
      rafBatch(() => {
        updatePendingBadge();
        if (currentPage === 'dashboard') { updateStats(); renderPendingOrders(); updateDonut(); }
        else if (currentPage === 'orders') applyFilters($('orderSearch')?.value || '');
      });
    }
    showToast('❌ ' + (data.message || 'Gagal'), 'error', 5000);
  }
}

function showDetail(orderId) {
  const order = allOrders.find(o => o.ORDER_ID === orderId);
  if (!order) return;
  editOrderId = orderId;
  editItems = (order.DETAIL || []).map(d => ({
    kode: String(d.KODE_BARANG||''),
    nama: String(d.NAMA_BARANG||''),
    kategori: String(d.KATEGORI||''),
    qty: parseFloat(d.QTY)||0,
    originalQty: parseFloat(d.ORIGINAL_QTY) || parseFloat(d.QTY) || 0,
    satuan: String(d.SATUAN||'PCS'),
    harga: parseFloat(d.HARGA_SATUAN)||0,
    itemStatus: String(d.ITEM_STATUS||'APPROVED').toUpperCase(),
    reason: String(d.REASON||'')
  }));
  const cb = CABANG_INFO[order.ID_CABANG] || { nama:'-', icon:'🏪', pic:'-' };
  const sc = { PENDING:'var(--yellow)', APPROVED:'var(--green)', REJECTED:'var(--red)' };

  $('modalTitle').textContent = `📦 ${orderId}`;
  $('modalBody').innerHTML = `
    <div class="info-row"><span class="info-label">Cabang</span><span class="info-value">${cb.icon} ${esc(cb.nama)} (${esc(order.ID_CABANG)})</span></div>
    <div class="info-row"><span class="info-label">PIC</span><span class="info-value">${esc(cb.pic)}</span></div>
    <div class="info-row"><span class="info-label">Tanggal Order</span><span class="info-value">${formatTanggalDisplay(String(order.TANGGAL_ORDER||''))}</span></div>
    <div class="info-row"><span class="info-label">Status</span><span class="info-value" style="color:${sc[order.STATUS]||'#fff'};font-weight:800;">${esc(order.STATUS)}</span></div>
    ${order.CATATAN?`<div class="info-row"><span class="info-label">Catatan Cabang</span><span class="info-value">${esc(order.CATATAN)}</span></div>`:''}
    <div class="edit-section-title">✏️ Kelola Item <span class="edit-section-count" id="editSectionCount">${editItems.length} item</span></div>
    <div id="editRows"></div>
    <div class="add-row">
      <select id="addKode"><option value="">+ Pilih barang untuk ditambah…</option>${allKatalog.map(b=>`<option value="${esc(b.KODE_BARANG)}">${esc(b.KODE_BARANG)} — ${esc(b.NAMA_BARANG)}</option>`).join('')}</select>
      <input type="number" id="addQty" min="1" value="1" placeholder="Jml">
      <button class="btn-add-item" id="btnTambahItem">+ Tambah</button>
    </div>
    <div class="edit-total"><span>Total Disetujui:</span><span id="editTotal">Rp 0</span></div>
    <textarea class="edit-catatan" id="editCatatan" rows="2" placeholder="Catatan admin (opsional)..."></textarea>
    <div class="modal-foot">
      <button class="mf-btn mf-save" id="btnSaveEdit">💾 Simpan Perubahan</button>
      <button class="mf-btn mf-email" id="btnSendEmail">📧 Kirim Email ke Cabang</button>
      <button class="mf-btn mf-cancel" id="btnCloseModal">Tutup</button>
    </div>
  `;
  renderEditRows();
  $('modalOverlay').classList.add('show');

  $('btnTambahItem').onclick = tambahItem;
  $('btnSaveEdit').onclick = konfirmasiSimpan;
  $('btnSendEmail').onclick = konfirmasiKirimEmail;
  $('btnCloseModal').onclick = closeModalDirect;
}

function renderEditRows() {
  const wrap = $('editRows');
  if (!wrap) return;
  if (!editItems.length) {
    wrap.innerHTML = '<div class="empty-state" style="padding:20px;"><p>Tidak ada item.</p></div>';
    hitungTotal();
    return;
  }
  wrap.innerHTML = editItems.map((it, idx) => {
    const isDel = it.itemStatus === 'DELETED';
    const isRej = it.itemStatus === 'REJECTED';
    const isEdited = !isDel && !isRej && it.originalQty && it.originalQty !== it.qty;
    let cls='approved', badge='', needReason=false, reasonLabel='Keterangan (opsional)', reasonPh='...';
    if (isDel) { cls='deleted'; badge='<span class="er-badge del-badge">🗑️ DIHAPUS</span>'; needReason=true; reasonLabel='📝 Alasan Penghapusan (WAJIB)'; reasonPh='Contoh: Barang tidak ada...'; }
    else if (isRej) { cls='rejected'; badge='<span class="er-badge rej-badge">🚫 DITOLAK</span>'; needReason=true; reasonLabel='📝 Alasan Penolakan (WAJIB)'; reasonPh='Contoh: Stok tidak cukup...'; }
    else if (isEdited) { cls='edited'; badge='<span class="er-badge edit-badge">✏️ DIEDIT</span>'; reasonLabel='📝 Keterangan Perubahan (opsional)'; reasonPh=`Asli: ${it.originalQty}, sekarang: ${it.qty}...`; }
    const showRestore = isDel || isRej;
    return `<div class="edit-row ${cls}"><div class="er-top"><div><div class="er-kode">${esc(it.kode)} ${badge}</div><div class="er-nama">${esc(it.nama||'(tanpa nama)')}</div><div class="er-harga">${formatRp(it.harga)} / ${esc(it.satuan)}</div></div><input type="number" class="er-qty" min="1" value="${it.qty}" ${(isDel||isRej)?'disabled':''} data-qty-idx="${idx}"><div class="er-sub">${(!isDel&&!isRej)?formatRp(it.qty*it.harga):'-'}</div><div class="er-acts">${showRestore?`<button class="er-btn restore" data-restore="${idx}">↩️</button>`:`<button class="er-btn edit" data-edit="${idx}">✏️</button><button class="er-btn rej ${isRej?'on':''}" data-reject="${idx}">🚫</button><button class="er-btn del ${isDel?'on':''}" data-delete="${idx}">🗑️</button>`}</div></div>${(needReason||isEdited)?`<div class="er-reason"><div class="er-reason-label">${reasonLabel}</div><textarea class="${needReason&&!it.reason?'required-empty':''}" placeholder="${reasonPh}" data-reason-idx="${idx}">${esc(it.reason||'')}</textarea></div>`:''}</div>`;
  }).join('');
  $('editSectionCount').textContent = `${editItems.length} item`;

  wrap.querySelectorAll('[data-qty-idx]').forEach(inp => {
    inp.addEventListener('input', debounce(e => ubahQty(parseInt(e.target.dataset.qtyIdx), e.target.value), 250));
  });
  wrap.querySelectorAll('[data-reason-idx]').forEach(ta => {
    ta.addEventListener('input', e => setReason(parseInt(e.target.dataset.reasonIdx), e.target.value));
  });
  wrap.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => editQtyManual(parseInt(b.dataset.edit)));
  wrap.querySelectorAll('[data-reject]').forEach(b => b.onclick = () => tolakItem(parseInt(b.dataset.reject)));
  wrap.querySelectorAll('[data-delete]').forEach(b => b.onclick = () => hapusItem(parseInt(b.dataset.delete)));
  wrap.querySelectorAll('[data-restore]').forEach(b => b.onclick = () => pulihkanItem(parseInt(b.dataset.restore)));

  hitungTotal();
}

function ubahQty(idx, val) {
  const it = editItems[idx];
  if (!it) return;
  const newQty = Math.max(1, parseInt(val) || 1);
  if (it.qty === newQty) return;
  it.qty = newQty;
  if (it.itemStatus !== 'APPROVED') it.itemStatus = 'APPROVED';
  rafBatch(() => renderEditRows());
}

function editQtyManual(idx) {
  const it = editItems[idx];
  if (!it) return;
  showPrompt({
    icon:'✏️', title:'Ubah Qty & Keterangan',
    msg:`${it.kode} — ${it.nama}\nQty asli: ${it.originalQty}\nQty saat ini: ${it.qty}`,
    placeholder:'Alasan perubahan qty (opsional)...',
    okText:'💾 Update', okClass:'info', required:false,
    defaultVal:it.reason||'', showNumber:true, numberVal:it.qty,
    onOk: (result) => {
      it.qty = Math.max(1, result.number);
      it.reason = result.text;
      if (it.itemStatus !== 'APPROVED') it.itemStatus = 'APPROVED';
      rafBatch(() => renderEditRows());
      showToast('✏️ Qty diperbarui', 'info', 2000);
    }
  });
}

function tolakItem(idx) {
  const it = editItems[idx];
  if (!it) return;
  if (it.itemStatus === 'REJECTED') {
    it.itemStatus = 'APPROVED'; it.reason = '';
    rafBatch(() => renderEditRows());
    showToast('↩️ Item dipulihkan', 'success', 2000);
    return;
  }
  showPrompt({
    icon:'🚫', title:'Tolak Item',
    msg:`${it.kode} — ${it.nama}\nQty: ${it.qty}\n\nIsi alasan (WAJIB):`,
    placeholder:'Contoh: Stok tidak cukup...', okText:'🚫 Ya, Tolak',
    okClass:'danger', required:true, defaultVal:it.reason||'',
    onOk: (reason) => {
      it.itemStatus = 'REJECTED'; it.reason = reason;
      rafBatch(() => renderEditRows());
      showToast('🚫 Item ditolak', 'warning', 2000);
    }
  });
}

function hapusItem(idx) {
  const it = editItems[idx];
  if (!it) return;
  if (it.itemStatus === 'DELETED') {
    it.itemStatus = 'APPROVED'; it.reason = '';
    rafBatch(() => renderEditRows());
    showToast('↩️ Item dipulihkan', 'success', 2000);
    return;
  }
  showPrompt({
    icon:'🗑️', title:'Hapus Item',
    msg:`${it.kode} — ${it.nama}\nQty: ${it.qty}\n\nIsi alasan penghapusan (WAJIB):`,
    placeholder:'Contoh: Tidak ada di katalog...', okText:'🗑️ Ya, Hapus',
    okClass:'danger', required:true, defaultVal:it.reason||'',
    onOk: (reason) => {
      it.itemStatus = 'DELETED'; it.reason = reason;
      rafBatch(() => renderEditRows());
      showToast('🗑️ Item dihapus', 'warning', 2000);
    }
  });
}

function pulihkanItem(idx) {
  const it = editItems[idx];
  if (!it) return;
  it.itemStatus = 'APPROVED'; it.reason = '';
  rafBatch(() => renderEditRows());
  showToast('↩️ Item dipulihkan', 'success', 2000);
}

function setReason(idx, val) {
  if (editItems[idx]) editItems[idx].reason = val;
}

function tambahItem() {
  const kode = $('addKode').value;
  const qty = Math.max(1, parseInt($('addQty').value)||1);
  if (!kode) { showToast('⚠️ Pilih barang', 'warning'); return; }
  const b = allKatalog.find(x => String(x.KODE_BARANG).toUpperCase() === String(kode).toUpperCase());
  if (!b) { showToast('❌ Barang tidak ditemukan', 'error'); return; }
  const stok = parseInt(b.STOK) || 0;
  if (stok < qty) { showToast(`⚠️ Stok hanya ${stok}`, 'warning'); return; }
  const ada = editItems.find(x => String(x.kode).toUpperCase() === String(kode).toUpperCase() && x.itemStatus === 'APPROVED');
  if (ada) {
    ada.qty += qty;
    showToast(`✅ Qty ${kode} +${qty}`, 'success', 2000);
  } else {
    editItems.push({
      kode: String(b.KODE_BARANG), nama: String(b.NAMA_BARANG||''),
      kategori: String(b.KATEGORI||''), qty, originalQty: 0,
      satuan: String(b.SATUAN||'PCS'), harga: parseFloat(b.HARGA)||0,
      itemStatus: 'APPROVED', reason: 'Item baru ditambah admin'
    });
    showToast(`✅ ${b.NAMA_BARANG} ditambahkan`, 'success', 2000);
  }
  $('addKode').value = ''; $('addQty').value = 1;
  rafBatch(() => renderEditRows());
}

function hitungTotal() {
  const t = editItems.filter(i => i.itemStatus === 'APPROVED').reduce((s,i) => s + i.qty*i.harga, 0);
  const el = $('editTotal');
  if (el) el.textContent = formatRp(t);
}

function konfirmasiSimpan() {
  const aktif = editItems.filter(i => i.itemStatus === 'APPROVED').length;
  const rej = editItems.filter(i => i.itemStatus === 'REJECTED').length;
  const del = editItems.filter(i => i.itemStatus === 'DELETED').length;
  const edited = editItems.filter(i => i.itemStatus === 'APPROVED' && i.originalQty && i.originalQty !== i.qty).length;
  if (!aktif && !rej && !del) { showToast('⚠️ Pesanan kosong', 'warning'); return; }
  const kurang = editItems.filter(i => (i.itemStatus === 'REJECTED' || i.itemStatus === 'DELETED') && !i.reason.trim());
  if (kurang.length > 0) { showToast(`⚠️ ${kurang.length} item butuh alasan`, 'warning', 3000); renderEditRows(); return; }
  const order = allOrders.find(o => o.ORDER_ID === editOrderId);
  const statusLama = order ? String(order.STATUS).toUpperCase() : 'PENDING';
  showConfirm({
    icon:'💾', title:'Simpan Perubahan?',
    msg:`Order ${editOrderId}:\n✅ ${aktif} disetujui${edited?`\n✏️ ${edited} diedit`:''}${rej?`\n🚫 ${rej} ditolak`:''}${del?`\n🗑️ ${del} dihapus`:''}\n\n⚠️ STATUS TETAP ${statusLama}\n📧 Email BELUM dikirim`,
    okText:'💾 Ya, Simpan', okClass:'success',
    onOk: () => doSimpanEdit(false)
  });
}

function konfirmasiKirimEmail() {
  const order = allOrders.find(o => o.ORDER_ID === editOrderId);
  const cb = order ? CABANG_INFO[order.ID_CABANG] : { pic:'-' };
  const aktif = editItems.filter(i => i.itemStatus === 'APPROVED').length;
  const rej = editItems.filter(i => i.itemStatus === 'REJECTED').length;
  const del = editItems.filter(i => i.itemStatus === 'DELETED').length;
  const edited = editItems.filter(i => i.itemStatus === 'APPROVED' && i.originalQty && i.originalQty !== i.qty).length;
  if (!aktif && !rej && !del) { showToast('⚠️ Tidak ada item', 'warning'); return; }
  const kurang = editItems.filter(i => (i.itemStatus === 'REJECTED' || i.itemStatus === 'DELETED') && !i.reason.trim());
  if (kurang.length > 0) { showToast(`⚠️ ${kurang.length} item butuh alasan`, 'warning', 3000); renderEditRows(); return; }
  const newStatus = aktif === 0 ? 'REJECTED' : 'APPROVED';
  showConfirm({
    icon:'📧', title:'Approve & Kirim Email?',
    msg:`Ke email cabang ${cb.pic}\n📧 CC Admin\n\n✅ ${aktif} disetujui${edited?`\n✏️ ${edited} diedit`:''}${rej?`\n🚫 ${rej} ditolak`:''}${del?`\n🗑️ ${del} dihapus`:''}\n\n⚡ Status jadi: ${newStatus}`,
    okText:'📧 Approve & Kirim', okClass:'info',
    onOk: () => doSimpanEdit(true)
  });
}

async function doSimpanEdit(kirimEmail) {
  const btnSave = $('btnSaveEdit');
  const btnEmail = $('btnSendEmail');
  if (btnSave) { btnSave.disabled = true; btnSave.innerHTML = '<span class="mini-spin"></span> Menyimpan...'; }
  if (btnEmail) btnEmail.disabled = true;
  const payload = {
    orderId: editOrderId,
    catatanAdmin: $('editCatatan').value.trim(),
    diprosesOleh: 'Admin Dashboard',
    kirimEmail,
    items: editItems.map(i => ({
      kode: i.kode, nama: i.nama, kategori: i.kategori,
      qty: i.qty, satuan: i.satuan, harga: i.harga,
      itemStatus: i.itemStatus, reason: i.reason||'',
      originalQty: i.originalQty
    }))
  };
  const hasil = await callAPI('editOrder', payload);
  if (btnSave) { btnSave.disabled = false; btnSave.innerHTML = '💾 Simpan Perubahan'; }
  if (btnEmail) btnEmail.disabled = false;
  if (hasil.status === 'ok') {
    showToast('✅ Disimpan!', 'success', 3000);
    if (kirimEmail) showToast('📧 Email diproses', 'info', 3000);
    closeModalDirect();
    lastLoadTime = 0;
    loadAllData(true);
  } else {
    showToast('❌ ' + (hasil.message || 'Gagal'), 'error', 5000);
  }
}

function closeModalDirect() {
  $('modalOverlay').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  const s = checkSession();
  if (!s) return;

  $('sidebarUserName').textContent = s.nama || 'Admin';

  // Sidebar navigation
  document.querySelectorAll('.nav-item[data-page]').forEach(item => {
    item.addEventListener('click', () => showPage(item.dataset.page));
  });

  // Sidebar overlay & menu
  $('topbarMenu').addEventListener('click', toggleSidebar);
  $('sidebarOverlay').addEventListener('click', closeSidebar);

  // Sidebar links
  $('navGoogleSheets').addEventListener('click', () => window.open('https://docs.google.com/spreadsheets', '_blank'));
  $('navGantiPass').addEventListener('click', () => window.location.href = 'ganti-password.html');
  $('navBukaToko').addEventListener('click', () => window.location.href = 'order.html');
  $('btnLogout').addEventListener('click', doLogout);

  // Refresh
  $('btnRefresh').addEventListener('click', () => loadAllData(true));

  // Modal
  $('modalClose').addEventListener('click', closeModalDirect);
  $('modalOverlay').addEventListener('click', e => { if (e.target === $('modalOverlay')) closeModalDirect(); });

  // Confirm/Prompt
  $('confirmCancel').addEventListener('click', () => { $('confirmOverlay').classList.remove('show'); _confirmCb = null; });
  $('confirmOk').addEventListener('click', () => {
    $('confirmOverlay').classList.remove('show');
    if (typeof _confirmCb === 'function') _confirmCb();
    _confirmCb = null;
  });
  $('promptCancel').addEventListener('click', () => { $('promptOverlay').classList.remove('show'); _promptCb = null; });
  $('promptOk').addEventListener('click', () => {
    const val = $('promptInput').value.trim();
    const num = parseInt($('promptNumber').value) || 1;
    if (_promptCb && _promptCb.required && !val) { showToast('⚠️ Alasan wajib!', 'warning'); return; }
    $('promptOverlay').classList.remove('show');
    if (_promptCb && typeof _promptCb.fn === 'function') {
      _promptCb.fn(_promptCb.showNumber ? { text: val, number: num } : val);
    }
    _promptCb = null;
  });

  // ESC to close
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if ($('promptOverlay').classList.contains('show')) { $('promptOverlay').classList.remove('show'); _promptCb = null; }
      else if ($('confirmOverlay').classList.contains('show')) { $('confirmOverlay').classList.remove('show'); _confirmCb = null; }
      else if ($('modalOverlay').classList.contains('show')) closeModalDirect();
      else closeSidebar();
    }
  });

  // Clock
  setInterval(updateClock, 1000);
  updateClock();

  // First render + load
  showPage('dashboard');
  loadAllData(true);
  setInterval(() => loadAllData(false), 60000);
});

// Fix 100vh mobile
function setVH() {
  document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
}
setVH();
window.addEventListener('resize', setVH, { passive: true });
window.addEventListener('orientationchange', setVH, { passive: true });
</script>
