<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d1a">
  <title>GudangHub — Profil</title>

  <link rel="manifest" href="/gudanghub/assets/manifest-DWsLcWLB.json">
  <link rel="apple-touch-icon" href="./public/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    body {
      background: var(--ink);
      min-height: 100dvh;
    }

    .topbar {
      background: var(--ink-2);
      border-bottom: 1px solid var(--line-soft);
      padding: 12px 20px;
      padding-top: calc(12px + var(--safe-top));
      padding-right: calc(20px + var(--safe-right));
      padding-left: calc(20px + var(--safe-left));
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: var(--z-sticky);
    }

    .topbar-back {
      display: grid;
      min-width: 40px;
      min-height: 40px;
      place-items: center;
      padding: 8px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      text-decoration: none;
      transition: all 0.15s;
    }

    .topbar-back:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .topbar-title {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 700;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-title em {
      color: var(--orange);
      font-style: normal;
    }

    .content {
      padding: 20px;
      padding-left: calc(20px + var(--safe-left));
      padding-right: calc(20px + var(--safe-right));
      padding-bottom: calc(20px + var(--safe-bottom));
      max-width: 900px;
      margin: 0 auto;
    }

    /* PROFILE HERO */
    .profile-hero {
      background: linear-gradient(135deg, var(--card), var(--ink-3));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      margin-bottom: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .profile-hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 107, 0, 0.15), transparent 70%);
      pointer-events: none;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--orange-deep));
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 40px;
      font-weight: 800;
      box-shadow: 0 12px 40px rgba(255, 107, 0, 0.4);
      position: relative;
      z-index: 1;
    }

    .profile-name {
      font-family: var(--font-serif);
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 700;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }

    .profile-username {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 14px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .profile-role {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      background: var(--orange-dim);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--orange);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      position: relative;
      z-index: 1;
    }

    /* INFO GRID */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .info-card {
      background: var(--card);
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .info-card:hover {
      border-color: var(--line-orange);
    }

    .info-card-icon {
      width: 40px;
      height: 40px;
      background: var(--orange-dim);
      color: var(--orange);
      border-radius: 10px;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
    }

    .info-card-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .info-card-value {
      font-size: 16px;
      font-weight: 700;
      word-break: break-word;
    }

    .info-card-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    /* ACTIONS */
    .actions-panel {
      background: var(--card);
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .actions-panel-title {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .actions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      background: var(--ink-3);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
      min-height: 48px;
    }

    .action-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
      transform: translateY(-1px);
    }

    .action-btn.danger:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    .action-btn-icon {
      flex-shrink: 0;
      display: grid;
      place-items: center;
    }

    /* SESSION */
    .session-info {
      background: var(--card);
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .session-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--line-soft);
      font-size: 13px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .session-row:last-child { border-bottom: none; }

    .session-label {
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .session-value {
      font-weight: 600;
      text-align: right;
      word-break: break-all;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    /* ACTIVITY */
    .activity-panel {
      background: var(--card);
      border: 1px solid var(--line-soft);
      border-radius: 16px;
      overflow: hidden;
    }

    .activity-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .activity-title {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .activity-count {
      color: var(--muted);
      font-size: 12px;
    }

    .activity-list {
      padding: 8px 20px 16px;
      max-height: 500px;
      overflow-y: auto;
    }

    .activity-item {
      display: flex;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line-soft);
    }

    .activity-item:last-child { border-bottom: none; }

    .activity-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .activity-icon.orange { background: var(--orange-dim); color: var(--orange); }
    .activity-icon.green { background: rgba(34, 197, 94, 0.15); color: var(--success); }
    .activity-icon.red { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
    .activity-icon.blue { background: rgba(59, 130, 246, 0.15); color: var(--info); }

    .activity-content { flex: 1; min-width: 0; }

    .activity-desc {
      font-size: 13px;
      margin-bottom: 3px;
      line-height: 1.4;
    }

    .activity-desc strong {
      color: var(--orange);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .activity-time {
      font-size: 11px;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state .empty-icon {
      margin-bottom: 12px;
      opacity: 0.5;
      display: grid;
      place-items: center;
    }

    @media (max-width: 600px) {
      .content { padding: 12px; }
      .profile-hero { padding: 24px 16px; }
      .profile-avatar { width: 80px; height: 80px; font-size: 32px; }
    }
  </style>
  <script type="module" crossorigin src="/gudanghub/assets/js/profil-D9GNL2CH.js"></script>
  <link rel="modulepreload" crossorigin href="/gudanghub/assets/js/icons-DdqG2uRW.js">
  <link rel="modulepreload" crossorigin href="/gudanghub/assets/js/api-DBPU_7n9.js">
  <link rel="modulepreload" crossorigin href="/gudanghub/assets/js/ui-CDv0hAY9.js">
  <link rel="stylesheet" crossorigin href="/gudanghub/assets/css/icons-BrzFGbpM.css">
</head>

<body>

  <header class="topbar">
    <a class="topbar-back" id="btnBack" href="./dashboard.html" title="Kembali">
      <span data-icon="arrow-left" data-icon-size="18"></span>
    </a>
    <div class="topbar-title">
      <span data-icon="user-circle" data-icon-size="20" data-icon-color="var(--orange)"></span>
      Profil <em>Pengguna</em>
    </div>
  </header>

  <main class="content">

    <!-- PROFILE HERO -->
    <section class="profile-hero">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <h1 class="profile-name" id="profileName">-</h1>
      <div class="profile-username" id="profileUsername">@-</div>
      <div class="profile-role" id="profileRole">-</div>
    </section>

    <!-- INFO CARDS -->
    <div class="info-grid">
      <article class="info-card">
        <div class="info-card-icon">
          <span data-icon="store" data-icon-size="20"></span>
        </div>
        <div class="info-card-label">Cabang</div>
        <div class="info-card-value" id="infoCabang">-</div>
        <div class="info-card-sub" id="infoCabangSub">-</div>
      </article>

      <article class="info-card">
        <div class="info-card-icon">
          <span data-icon="phone" data-icon-size="20"></span>
        </div>
        <div class="info-card-label">Kontak</div>
        <div class="info-card-value" id="infoKontak">-</div>
        <div class="info-card-sub">Telepon cabang</div>
      </article>

      <article class="info-card">
        <div class="info-card-icon">
          <span data-icon="map-pin" data-icon-size="20"></span>
        </div>
        <div class="info-card-label">Alamat</div>
        <div class="info-card-value" id="infoAlamat" style="font-size: 13px;">-</div>
      </article>

      <article class="info-card">
        <div class="info-card-icon">
          <span data-icon="calendar-clock" data-icon-size="20"></span>
        </div>
        <div class="info-card-label">Login Sejak</div>
        <div class="info-card-value" id="infoLoginAt" style="font-size: 13px;">-</div>
        <div class="info-card-sub" id="infoLoginAgo">-</div>
      </article>
    </div>

    <!-- ACTIONS -->
    <section class="actions-panel">
      <h2 class="actions-panel-title">
        <span data-icon="zap" data-icon-size="18" data-icon-color="var(--orange)"></span>
        Aksi Cepat
      </h2>
      <div class="actions-grid">
        <a href="./ganti-password.html" class="action-btn">
          <span class="action-btn-icon" data-icon="key" data-icon-size="20"></span>
          <span>Ganti Password</span>
        </a>
        <a href="./notifikasi.html" class="action-btn">
          <span class="action-btn-icon" data-icon="bell" data-icon-size="20"></span>
          <span>Notifikasi</span>
        </a>
        <a href="./laporan.html" class="action-btn">
          <span class="action-btn-icon" data-icon="chart-bar" data-icon-size="20"></span>
          <span>Laporan</span>
        </a>
        <a id="btnMainHome" href="./dashboard.html" class="action-btn">
          <span class="action-btn-icon" data-icon="home" data-icon-size="20"></span>
          <span>Halaman Utama</span>
        </a>
        <button type="button" class="action-btn danger" id="btnLogout">
          <span class="action-btn-icon" data-icon="logout" data-icon-size="20"></span>
          <span>Keluar</span>
        </button>
      </div>
    </section>

    <!-- SESSION INFO -->
    <section class="session-info">
      <h2 class="actions-panel-title" style="margin-bottom: 14px;">
        <span data-icon="shield-check" data-icon-size="18" data-icon-color="var(--orange)"></span>
        Session Info
      </h2>
      <div class="session-row">
        <span class="session-label">
          <span data-icon="key" data-icon-size="14"></span>
          Token
        </span>
        <span class="session-value" id="sessionToken">-</span>
      </div>
      <div class="session-row">
        <span class="session-label">
          <span data-icon="calendar-clock" data-icon-size="14"></span>
          Expires
        </span>
        <span class="session-value" id="sessionExpires">-</span>
      </div>
      <div class="session-row">
        <span class="session-label">
          <span data-icon="timer" data-icon-size="14"></span>
          Sisa Waktu
        </span>
        <span class="session-value" id="sessionRemaining">-</span>
      </div>
    </section>

    <!-- ACTIVITY -->
    <section class="activity-panel">
      <header class="activity-header">
        <h2 class="activity-title">
          <span data-icon="activity" data-icon-size="18" data-icon-color="var(--orange)"></span>
          Aktivitas Terbaru
        </h2>
        <span class="activity-count" id="activityCount"></span>
      </header>
      <div class="activity-list" id="activityList">
        <div class="empty-state">
          <div class="empty-icon"></div>
          <p>Memuat aktivitas...</p>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
