<script>
(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

</script>

ius:8px;padding:8px 10px;font-size:11px;margin-bottom:9px}.warn.show{display:block}.sum{display:flex;justify-content:space-between;color:var(--muted);font-size:12px}.total{display:flex;justify-content:space-between;color:var(--orange);font-weight:850;font-size:16px;padding-top:9px;margin-top:7px;border-top:1px solid var(--line)}textarea.note{width:100%;margin-top:10px;padding:10px;border:1px solid var(--line);border-radius:9px;background:var(--card);color:var(--text);resize:vertical}.send:disabled{opacity:.45;pointer-events:none}
.formpage{padding:20px 16px 120px}.formpage h2{margin:0 0 4px}.sub{color:var(--muted);font-size:12px}.format{margin:16px 0;padding:13px;border:1px solid rgba(255,107,0,.25);border-radius:12px;background:rgba(255,107,0,.08);font-size:12px}.massinput{width:100%;min-height:130px;padding:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;color:var(--text);font:14px ui-monospace,monospace}.massactions{display:flex;gap:8px}.secondary{flex:1;margin-top:9px;padding:10px;border:1px solid var(--line);border-radius:9px;background:var(--card2);color:var(--muted)}.preview{margin-top:18px}.massrow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:11px;border:1px solid var(--line);border-radius:11px;background:var(--card);margin-bottom:8px}.massrow.error{border-color:rgba(239,68,68,.5)}.massright{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.massright input{width:62px;padding:6px;border:1px solid var(--line);border-radius:7px;background:var(--card2);color:var(--text);text-align:center}.history{padding:18px 16px}.history h2{margin:0}.order{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px;margin:10px 0}.oid{color:var(--orange);font:700 11px ui-monospace,monospace}.status{float:right;font-size:10px;padding:4px 8px;border-radius:999px}.pending{color:var(--yellow);background:rgba(245,158,11,.14)}.approved{color:var(--green);background:rgba(34,197,94,.14)}.rejected{color:var(--red);background:rgba(239,68,68,.14)}

<body>
<header class="topbar"><div class="logo">🏪</div><div class="title">GudangHub</div><div class="branch">🏬 <span id="branchLabel">Memuat...</span></div><a class="topbtn" href="ganti-password.html" title="Ganti password">🔑</a><button class="topbtn" id="logout" title="Keluar">🚪</button></header>
<main>
<section id="catalogPage" class="page active"><div class="toolbar"><div class="search-wrap"><input id="search" class="search" placeholder="Cari kode atau nama barang..." autocomplete="off"></div><div id="chips" class="chips"><button class="chip active" data-cat="">Semua</button></div></div><div id="label" class="label">Memuat katalog...</div><div id="catalog" class="grid"><div class="loading">⏳ Memuat katalog...</div></div></section>
<section id="massPage" class="page"><div class="formpage"><h2>⚡ Order Massal</h2><div class="sub">Format satu baris: KODE;JUMLAH</div><div class="format"><b>Contoh</b><br><code>NN00001;5<br>NN00002;10</code><br><small>Isi stok gudang dan stok toko untuk setiap barang valid.</small></div><textarea id="massInput" class="massinput" placeholder="NN00001;5&#10;NN00002;10"></textarea><div class="massactions"><button id="paste" class="secondary">📋 Paste</button><button id="clearMass" class="secondary">🗑️ Hapus</button></div><div id="massPreview" class="preview"></div><div id="massWarn" class="warn"></div><textarea id="massNote" class="note" placeholder="Catatan untuk admin (opsional)" rows="2"></textarea><button id="massSubmit" class="send" disabled>🚀 Kirim Order Massal</button></div></section>
<section id="historyPage" class="page"><div class="history"><h2>📋 Riwayat Order</h2><div class="sub">Order dari cabang <b id="historyBranch"></b></div><div id="historyList"><div class="loading">⏳ Memuat riwayat...</div></div></div></section>
</main>
<div id="cartBar" class="cartbar"><button id="openCart"><span>🛒 Lihat Keranjang</span><span id="cartCount" class="count">0 item</span></button></div>
<nav class="nav"><button class="tab active" data-tab="catalog"><span>📚</span>Katalog</button><button class="tab" data-tab="mass"><span>⚡</span>Order Massal</button><button class="tab" data-tab="history"><span>📋</span>Riwayat</button></nav>
<div id="overlay" class="overlay"></div><section id="sheet" class="sheet"><div class="handle"></div><div class="sheethead"><b>🛒 Keranjang Order</b><button id="closeCart">✕</button></div><div id="cartItems" class="cartitems"></div><div class="summary"><div id="cartWarn" class="warn"></div><div class="sum"><span>Jumlah Item</span><b id="sumItems">0</b></div><div class="total"><span>Total Order</span><span id="sumTotal">Rp 0</span></div><textarea id="note" class="note" rows="2" placeholder="Catatan untuk admin (opsional)"></textarea><button id="submit" class="send" disabled>🚀 Kirim Order ke Gudang</button></div></section>
<script>
'use strict';
const API_URL='https://script.google.com/macros/s/AKfycbzk8A4xuXOVGqbK6a4zffpG6u2s4jVROZwIitmCDat2fYU7qyU3VkxQJmtxtEtjQxji/exec';
const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const rp=n=>'Rp '+(Number(n)||0).toLocaleString('id-ID');
let branch='',branchName='',products=[],byCode={},cart={},mass=[];let activeCat='';
const branches={CB001:'Toko Nasional Eltari',CB002:'Toko Perabot Mama Oesapa',CB003:'Toko Perabot Mama TDM',CB004:'Toko Perabot Mama Kefamenanu'};
function session(){let s;try{s=JSON.parse(sessionStorage.getItem('gudanghub_session')||'null')}catch(e){};const q=new URLSearchParams(location.search),url=(q.get('cabang')||'').toUpperCase();if(!s||new Date(s.expires)<new Date()){location.href='login.html';return false}if(s.role==='admin'){location.href='dashboard.html';return false}branch=String(s.idCabang||url).toUpperCase();if(!branch){location.href='login.html';return false}branchName=s.nama||branches[branch]||branch;$('branchLabel').textContent=branch+' · '+(branches[branch]||branch);$('historyBranch').textContent=branch;return true}
function api(action,payload={}){const body=JSON.stringify({...payload,action});return fetch(API_URL+'?action='+encodeURIComponent(action)+'&payload='+encodeURIComponent(body),{cache:'no-store'}).then(r=>r.text()).then(t=>{try{return JSON.parse(t)}catch(e){return{status:'error',message:'Respons tidak valid'}}}).catch(()=>({status:'error',message:'Gagal terhubung ke server'}))}
async function loadProducts(){const d=await api('getBarang');if(d.status!=='ok'){ $('catalog').innerHTML='<div class="empty-state">⚠️ Gagal memuat katalog</div>';return}products=d.data||[];byCode={};products.forEach(p=>byCode[String(p.KODE_BARANG||'').trim().toUpperCase()]=p);buildCats();renderProducts()}
function buildCats(){const cats=[...new Set(products.map(p=>String(p.KATEGORI||'')).filter(Boolean))].sort();$('chips').innerHTML='<button class="chip active" data-cat="">Semua</button>'+cats.map(c=>'<button class="chip" data-cat="'+esc(c)+'">'+esc(c)+'</button>').join('')}
function emoji(c){return({Kursi:'🪑',Meja:'🍽️',Lemari:'🗄️',Sofa:'🛋️',Kasur:'🛏️',Rak:'📚',Dapur:'🍳',Dekorasi:'🎨'})[c]||'📦'}
function renderProducts(){const q=$('search').value.toLowerCase().trim();const rows=products.filter(p=>(!activeCat||String(p.KATEGORI||'')===activeCat)&&(!q||String(p.KODE_BARANG||'').toLowerCase().includes(q)||String(p.NAMA_BARANG||'').toLowerCase().includes(q)));$('label').textContent='Katalog Barang · '+rows.length+' item';$('catalog').innerHTML=rows.length?rows.map(card).join(''):'<div class="empty-state">🔍 Barang tidak ditemukan</div>'}
function card(p){const code=String(p.KODE_BARANG||''),stock=Number(p.STOK)||0,qty=cart[code]?.qty||1,inc=!!cart[code],cls=stock===0?'empty':stock<=5?'low':'ok';return '<article class="item '+(inc?'incart':'')+'" id="item-'+esc(code)+'"><span class="stock '+cls+'">'+(stock?'Stok '+stock:'Habis')+'</span><div class="emoji">'+emoji(String(p.KATEGORI||''))+'</div><div class="code">'+esc(code)+'</div><div class="name">'+esc(p.NAMA_BARANG)+'</div><div class="cat">'+esc(p.KATEGORI||'-')+'</div><div class="price">'+rp(p.HARGA)+'</div><div class="unit">per '+esc(p.SATUAN||'PCS')+'</div><div class="qtyrow"><button data-a="dec" data-c="'+esc(code)+'">−</button><input id="qty-'+esc(code)+'" type="number" min="1" max="'+stock+'" value="'+qty+'"><button data-a="inc" data-c="'+esc(code)+'">+</button></div><button class="add '+(inc?'added':'')+'" data-a="add" data-c="'+esc(code)+'" '+(stock?'':'disabled')+'>'+(inc?'✅ Di Keranjang':'+ Tambah')+'</button></article>'}
function validateStocks(items){return items.filter(i=>i.stokGudang===''||i.stokGudang==null||i.stokToko===''||i.stokToko==null)}
function updateCart(){const a=Object.values(cart),qty=a.reduce((s,i)=>s+i.qty,0),total=a.reduce((s,i)=>s+i.qty*i.harga,0);$('cartBar').classList.toggle('show',a.length>0);$('cartCount').textContent=qty+' item · '+rp(total);$('sumItems').textContent=qty+' item';$('sumTotal').textContent=rp(total);$('submit').disabled=!a.length||validateStocks(a).length>0;renderCart()}
function renderCart(){const a=Object.values(cart);$('cartItems').innerHTML=a.length?a.map(i=>'<div class="cartrow"><div><div class="cartname">'+esc(i.nama)+'</div><div class="cartmeta">'+esc(i.kode)+' · '+rp(i.harga)+' / '+esc(i.satuan)+'</div><div class="smallqty"><button data-ca="minus" data-c="'+esc(i.kode)+'">−</button><input value="'+i.qty+'" data-ca="qty" data-c="'+esc(i.kode)+'"><button data-ca="plus" data-c="'+esc(i.kode)+'">+</button><span style="color:var(--orange);font-weight:800"> = '+rp(i.qty*i.harga)+'</span></div></div><div><div class="stockfield"><label>🏭 Stok Gudang</label><input class="'+(i.stokGudang===''?'invalid':'')+'" type="number" min="0" value="'+(i.stokGudang===''?'':i.stokGudang)+'" data-sg="'+esc(i.kode)+'" placeholder="wajib"></div><div class="stockfield"><label>📦 Stok Toko</label><input class="'+(i.stokToko===''?'invalid':'')+'" type="number" min="0" value="'+(i.stokToko===''?'':i.stokToko)+'" data-st="'+esc(i.kode)+'" placeholder="wajib"></div><button class="delete" data-ca="del" data-c="'+esc(i.kode)+'">🗑️</button></div></div>').join(''):'<div class="empty-state">🛒 Keranjang kosong</div>';const missing=validateStocks(a);$('cartWarn').classList.toggle('show',missing.length>0);$('cartWarn').textContent=missing.length?'⚠️ Isi Stok Gudang dan Stok Toko untuk '+missing.length+' barang.':''}
function add(code){const p=byCode[code],q=Math.max(1,Math.min(Number(p.STOK)||1,Number($('qty-'+code)?.value)||1));cart[code]={kode:code,nama:String(p.NAMA_BARANG||''),kategori:String(p.KATEGORI||''),harga:Number(p.HARGA)||0,satuan:String(p.SATUAN||'PCS'),qty:q,stokGudang:'',stokToko:''};updateCart();renderProducts()}
function submitCommon(){const a=Object.values(cart);if(!a.length)return;if(validateStocks(a).length)return renderCart();const cat=$('note').value.trim();confirmSend(a,cat,'[STOK] '+a.map(i=>i.kode+': Gudang '+i.stokGudang+', Toko '+i.stokToko).join(' | '))}
function confirmSend(items,cat,extra){if(!confirm('Kirim '+items.length+' jenis barang ke gudang '+branch+'?'))return;const payload={idCabang:branch,catatan:(cat?cat+'\n\n':'')+extra,items:items.map(i=>({kode:i.kode,nama:i.nama,kategori:i.kategori,qty:i.qty,satuan:i.satuan,harga:i.harga,stokGudang:Number(i.stokGudang),stokToko:Number(i.stokToko)}))};$('submit').disabled=true;api('submitOrder',payload).then(d=>{if(d.status==='ok'){alert('✅ Order berhasil dikirim');cart={};$('note').value='';closeCart();updateCart();renderProducts()}else alert('❌ '+(d.message||'Gagal'));$('submit').disabled=false})}
function parseMass(){const lines=$('massInput').value.split(/\n/).map(x=>x.trim()).filter(Boolean);mass=lines.map(line=>{const p=line.split(/[;,\t]/).map(x=>x.trim()),code=String(p[0]||'').toUpperCase(),qty=Number(p[1])||0,b=byCode[code];if(!b||qty<1)return{code,qty,valid:false,error:!b?'Kode tidak ditemukan':'Jumlah harus > 0'};return{code,qty,valid:true,nama:String(b.NAMA_BARANG||''),kategori:String(b.KATEGORI||''),satuan:String(b.SATUAN||'PCS'),harga:Number(b.HARGA)||0,stokGudang:'',stokToko:''}});renderMass()}
function renderMass(){const good=mass.filter(x=>x.valid);$('massPreview').innerHTML=mass.length?mass.map((m,i)=>m.valid?'<div class="massrow"><div><b>'+esc(m.code)+'</b><div class="cat">'+esc(m.nama)+' · '+rp(m.harga)+' / '+esc(m.satuan)+'</div><div class="smallqty"><input value="'+m.qty+'" data-mq="'+i+'"></div></div><div class="massright"><input type="number" min="0" placeholder="🏭 gudang" value="'+(m.stokGudang||'')+'" data-mg="'+i+'"><input type="number" min="0" placeholder="📦 toko" value="'+(m.stokToko||'')+'" data-mt="'+i+'"><button class="delete" data-md="'+i+'">🗑️</button></div></div>':'<div class="massrow error"><b>'+esc(m.code||'?')+'</b><span>'+esc(m.error)+'</span></div>').join(''):'<div class="empty-state">Masukkan kode dan jumlah di atas</div>';const miss=good.filter(x=>x.stokGudang===''||x.stokToko==='').length;$('massWarn').classList.toggle('show',good.length>0&&miss>0);$('massWarn').textContent=miss?'⚠️ Isi stok gudang dan stok toko untuk '+miss+' barang valid.':'';$('massSubmit').disabled=!good.length||miss>0}
function submitMass(){const a=mass.filter(x=>x.valid);if(!a.length)return;if(a.some(x=>x.stokGudang===''||x.stokToko===''))return renderMass();if(!confirm('Kirim order massal '+a.length+' barang ke '+branch+'?'))return;const payload={idCabang:branch,catatan:'[MASSAL] '+$('massNote').value.trim()+'\n[STOK]',items:a.map(i=>({kode:i.code,nama:i.nama,kategori:i.kategori,qty:i.qty,satuan:i.satuan,harga:i.harga,stokGudang:Number(i.stokGudang),stokToko:Number(i.stokToko)}))};$('massSubmit').disabled=true;api('submitOrder',payload).then(d=>{alert(d.status==='ok'?'✅ Order massal berhasil dikirim':'❌ '+(d.message||'Gagal'));if(d.status==='ok'){$('massInput').value='';$('massNote').value='';mass=[];renderMass()}else $('massSubmit').disabled=false})}
function showTab(tab){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));$(tab==='catalog'?'catalogPage':tab==='mass'?'massPage':'historyPage').classList.add('active');document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));scrollTo(0,0);if(tab==='history')loadHistory()}
async function loadHistory(){const d=await api('getOrders');const list=(d.data||[]).filter(o=>String(o.ID_CABANG||'').toUpperCase()===branch).sort((a,b)=>String(b.TANGGAL_ORDER).localeCompare(String(a.TANGGAL_ORDER)));$('historyList').innerHTML=list.length?list.map(o=>{const st=String(o.STATUS||'PENDING').toLowerCase();return'<article class="order"><span class="oid">'+esc(o.ORDER_ID)+'</span><span class="status '+st+'">'+esc(o.STATUS)+'</span><div class="cat">🕐 '+esc(o.TANGGAL_ORDER||'-')+'</div><div class="cat">📦 '+(o.DETAIL||[]).slice(0,4).map(x=>esc(x.KODE_BARANG)+' × '+esc(x.QTY)).join(', ')+'</div></article>'}).join(''):'<div class="empty-state">Belum ada riwayat order</div>'}
function openCart(){renderCart();$('overlay').classList.add('show');$('sheet').classList.add('show');document.body.style.overflow='hidden'}function closeCart(){$('overlay').classList.remove('show');$('sheet').classList.remove('show');document.body.style.overflow=''}
$('search').oninput=renderProducts;$('chips').onclick=e=>{const b=e.target.closest('[data-cat]');if(!b)return;activeCat=b.dataset.cat;document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x===b));renderProducts()};$('catalog').onclick=e=>{const b=e.target.closest('[data-a]');if(!b)return;const c=b.dataset.c,a=b.dataset.a;if(a==='add')add(c);else if(a==='inc'){$('qty-'+c).value=Number($('qty-'+c).value||1)+1}else if(a==='dec'){$('qty-'+c).value=Math.max(1,Number($('qty-'+c).value||1)-1)}};$('cartItems').oninput=e=>{const c=e.target.dataset.sg||e.target.dataset.st;if(c){const v=e.target.value.trim();if(e.target.dataset.sg)cart[c].stokGudang=v===''?'':Math.max(0,Number(v)||0);else cart[c].stokToko=v===''?'':Math.max(0,Number(v)||0);updateCart()}};$('cartItems').onclick=e=>{const b=e.target.closest('[data-ca]');if(!b)return;const c=b.dataset.c,a=b.dataset.ca;if(a==='del')delete cart[c];else if(a==='plus')cart[c].qty++;else if(a==='minus')cart[c].qty=Math.max(1,cart[c].qty-1);updateCart();renderProducts()};$('openCart').onclick=openCart;$('closeCart').onclick=closeCart;$('overlay').onclick=closeCart;$('submit').onclick=submitCommon;$('massInput').oninput=parseMass;$('massPreview').oninput=e=>{let i=e.target.dataset.mg??e.target.dataset.mt??e.target.dataset.mq;if(i===undefined)return;if(e.target.dataset.mg)mass[i].stokGudang=e.target.value.trim();else if(e.target.dataset.mt)mass[i].stokToko=e.target.value.trim();else mass[i].qty=Math.max(1,Number(e.target.value)||1);renderMass()};$('massPreview').onclick=e=>{const b=e.target.closest('[data-md]');if(b){mass.splice(Number(b.dataset.md),1);renderMass()}};$('massSubmit').onclick=submitMass;$('paste').onclick=async()=>{try{$('massInput').value=await navigator.clipboard.readText();parseMass()}catch(e){alert('Paste manual dengan Ctrl+V')}};$('clearMass').onclick=()=>{$('massInput').value='';mass=[];renderMass()};document.querySelector('.nav').onclick=e=>{const b=e.target.closest('[data-tab]');if(b)showTab(b.dataset.tab)};$('logout').onclick=()=>{sessionStorage.removeItem('gudanghub_session');location.href='login.html'};
if(session())loadProducts();
</script>
